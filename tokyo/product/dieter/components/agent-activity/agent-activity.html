<div class="diet-agent-activity" data-size="{{size}}" data-tone="{{tone}}" role="status" aria-live="polite">
  <div class="diet-agent-activity__header">
    <span class="diet-agent-activity__title {{#if titleClass}}{{titleClass}}{{else}}label-s{{/if}}">{{title}}</span>
  </div>
  <div class="diet-agent-activity__rows">
    <div class="diet-agent-activity__row">
      <span class="diet-agent-activity__text {{#if rowClass}}{{rowClass}}{{else}}body-s{{/if}}">{{message}}</span>
    </div>
  </div>
</div>
