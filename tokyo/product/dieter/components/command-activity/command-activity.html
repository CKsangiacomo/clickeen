<div class="diet-command-activity" data-size="{{size}}" data-tone="{{tone}}" role="status" aria-live="polite">
  <div class="diet-command-activity__header">
    <span class="diet-command-activity__indicator" aria-hidden="true"></span>
    <span class="diet-command-activity__title {{#if titleClass}}{{titleClass}}{{else}}label-s{{/if}}">{{title}}</span>
  </div>
  <div class="diet-command-activity__rows">
    <div class="diet-command-activity__row" data-state="{{rowState}}">
      <span class="diet-command-activity__text {{#if rowClass}}{{rowClass}}{{else}}body-s{{/if}}">{{message}}</span>
    </div>
  </div>
</div>
