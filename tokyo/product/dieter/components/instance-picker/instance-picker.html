<div class="diet-instance-picker" data-size="{{size}}">
  <label class="diet-instance-picker__control">
    <span class="diet-instance-picker__label">{{label}}:</span>
    <select
      id="{{id}}"
      class="diet-instance-picker__field"
      aria-label="{{label}}"
      data-bob-instance-picker="true"
      data-placeholder="{{placeholder}}"{{#if path}} data-path="{{path}}"{{/if}}
    >
      <option value="">{{placeholder}}</option>
    </select>
  </label>
</div>
