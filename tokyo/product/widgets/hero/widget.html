<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Widget</title>
    <link rel="stylesheet" href="/dieter/tokens/tokens.css" />
    <link rel="stylesheet" href="/dieter/components/button/button.css" />
    <link rel="stylesheet" href="../shared/stagePod.css" />
    <link rel="stylesheet" href="./widget.css" />
  </head>
  <body>
    <div class="stage" data-role="stage">
      <div class="pod" data-role="pod">
        <div class="ck-widget ck-hero-widget" data-ck-widget="hero" data-role="root">
          <section class="ck-hero" data-role="hero" data-visual="false">
            <div class="ck-hero__grid" data-role="hero-grid">
              <div class="ck-hero__content" data-role="hero-content">
                <p class="ck-hero__eyebrow" data-role="hero-eyebrow" hidden></p>
                <h1 class="ck-hero__headline display-2" data-role="hero-headline"></h1>
                <div class="ck-hero__subheadline body-website" data-role="hero-subheadline"></div>
                <div class="ck-hero__actions" data-role="hero-actions">
                  <a class="ck-btn ck-btn--lg label-l ck-hero__button" data-role="hero-primary" hidden></a>
                  <a class="ck-btn ck-btn--secondaryCta ck-btn--lg label-l ck-hero__button" data-role="hero-secondary" hidden></a>
                </div>
              </div>
              <div class="ck-hero__visual" data-role="hero-visual" hidden>
                <div class="ck-hero__media" data-role="hero-media"></div>
              </div>
            </div>
          </section>
          <script src="../shared/fill.js?v=20260228-1" defer></script>
          <script src="../shared/appearance.js" defer></script>
          <script src="../shared/runtime.js" defer></script>
          <script src="../shared/typography-data.js" defer></script>
          <script src="../shared/typography.js" defer></script>
          <script src="../shared/stagePod.js" defer></script>
          <script src="../shared/branding.js" defer></script>
          <script src="../shared/previewL10n.js" defer></script>
          <script src="./widget.client.js" defer></script>
        </div>
      </div>
    </div>
  </body>
</html>
