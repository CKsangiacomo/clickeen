<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Split Media Widget</title>
    <link rel="stylesheet" href="/dieter/tokens/tokens.css" />
    <link rel="stylesheet" href="/dieter/components/button/button.css" />
    <link rel="stylesheet" href="../shared/header.css" />
    <link rel="stylesheet" href="../shared/localeSwitcher.css" />
    <link rel="stylesheet" href="../shared/stagePod.css" />
    <link rel="stylesheet" href="../shared/socialShare.css" />
    <link rel="stylesheet" href="./widget.css" />
  </head>
  <body>
    <div class="stage" data-role="stage">
      <div class="pod" data-role="pod">
        <div class="ck-widget ck-split-media-widget" data-ck-widget="split-media" data-role="root">
          <section class="ck-split-media ck-headerLayout" data-role="split-media">
            <header class="ck-split-media__header ck-header">
              <div class="ck-header__text">
                <h2 class="ck-split-media__title ck-header__title heading-2" data-role="header-title"></h2>
                <div class="ck-header__subtitle" data-role="header-subtitle" hidden></div>
              </div>
              <a class="ck-header__cta" data-role="header-cta" hidden></a>
            </header>
            <div class="ck-split-media__core ck-headerLayout__body" data-role="split-media-core"></div>
          </section>
          <script src="../shared/fill.js?v=20260228-1" defer></script>
          <script src="../shared/appearance.js" defer></script>
          <script src="../shared/runtime.js" defer></script>
          <script src="../shared/header.js" defer></script>
          <script src="../shared/localeSwitcher.js" defer></script>
          <script src="../shared/surface.js" defer></script>
          <script src="../shared/typography-data.js" defer></script>
          <script src="../shared/typography.js?v=20260607-1" defer></script>
          <script src="../shared/coreSize.js" defer></script>
          <script src="../shared/stagePod.js" defer></script>
          <script src="../shared/branding.js" defer></script>
          <script src="../shared/socialShare.js" defer></script>
          <script src="../shared/previewL10n.js" defer></script>
          <script src="./widget.client.js?v=20260607-1" defer></script>
        </div>
      </div>
    </div>
  </body>
</html>
