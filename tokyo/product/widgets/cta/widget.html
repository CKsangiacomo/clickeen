<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTA Widget</title>
    <link rel="stylesheet" href="/dieter/tokens/tokens.css" />
    <link rel="stylesheet" href="/dieter/components/button/button.css" />
    <link rel="stylesheet" href="../shared/stagePod.css" />
    <link rel="stylesheet" href="./widget.css" />
  </head>
  <body>
    <div class="stage" data-role="stage">
      <div class="pod" data-role="pod">
        <div class="ck-widget ck-cta-widget" data-ck-widget="cta" data-role="root">
          <section class="ck-cta" data-role="cta">
            <div class="ck-cta__content" data-role="cta-content">
              <h2 class="ck-cta__title display-2" data-role="cta-title"></h2>
              <div class="ck-cta__body body-website" data-role="cta-body"></div>
              <div class="ck-cta__actions" data-role="cta-actions">
                <a class="ck-btn ck-btn--lg label-l ck-cta__button" data-role="cta-primary" hidden></a>
                <a class="ck-btn ck-btn--secondaryCta ck-btn--lg label-l ck-cta__button" data-role="cta-secondary" hidden></a>
              </div>
            </div>
          </section>
          <script src="../shared/fill.js?v=20260228-1" defer></script>
          <script src="../shared/appearance.js" defer></script>
          <script src="../shared/runtime.js" defer></script>
          <script src="../shared/typography-data.js" defer></script>
          <script src="../shared/typography.js" defer></script>
          <script src="../shared/stagePod.js" defer></script>
          <script src="../shared/branding.js" defer></script>
          <script src="../shared/previewL10n.js" defer></script>
          <script src="./widget.client.js" defer></script>
        </div>
      </div>
    </div>
  </body>
</html>
