<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steps Widget</title>
    <link rel="stylesheet" href="/dieter/tokens/tokens.css" />
    <link rel="stylesheet" href="../shared/stagePod.css" />
    <link rel="stylesheet" href="./widget.css" />
  </head>
  <body>
    <div class="stage" data-role="stage">
      <div class="pod" data-role="pod">
        <div class="ck-widget ck-steps-widget" data-ck-widget="steps" data-role="root">
          <section class="ck-stepsWidget" data-role="steps" data-variant="cards">
            <header class="ck-stepsWidget__header" data-role="steps-header">
              <h2 class="ck-stepsWidget__title display-3" data-role="steps-title"></h2>
              <div class="ck-stepsWidget__subhead body-website" data-role="steps-subhead"></div>
            </header>
            <div class="ck-stepsWidget__row" data-role="steps-list"></div>
            <div class="ck-stepsWidget__empty body-s" data-role="steps-empty">No steps yet.</div>
          </section>
          <script src="../shared/fill.js?v=20260228-1" defer></script>
          <script src="../shared/appearance.js" defer></script>
          <script src="../shared/runtime.js" defer></script>
          <script src="../shared/typography-data.js" defer></script>
          <script src="../shared/typography.js" defer></script>
          <script src="../shared/stagePod.js" defer></script>
          <script src="../shared/branding.js" defer></script>
          <script src="../shared/previewL10n.js" defer></script>
          <script src="./widget.client.js" defer></script>
        </div>
      </div>
    </div>
  </body>
</html>
