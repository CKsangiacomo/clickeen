name = "tokyo-assets-dev"
main = "src/index.ts"
compatibility_date = "2025-12-28"
compatibility_flags = ["global_fetch_strictly_public"]
workers_dev = true
routes = [
  { pattern = "tokyo.dev.clickeen.com/l10n/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/assets/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/fonts/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/renders/*", zone_name = "clickeen.com" },
]

[vars]
BERLIN_BASE_URL = "https://berlin-dev.clickeen.workers.dev"
BERLIN_ISSUER = "https://berlin-dev.clickeen.workers.dev"
BERLIN_AUDIENCE = "clickeen.product"
SANFRANCISCO_BASE_URL = "https://sanfrancisco.dev.clickeen.com"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "eca50e55fa2a4f94a01fb81aeebf8377"
preview_id = "b31d28eb386c4c068821e32d41fbc92a"

[[kv_namespaces]]
binding = "L10N_STATE_KV"
id = "517ad6ecfa2f470f945c115aefcd17bf"

[[r2_buckets]]
binding = "TOKYO_R2"
bucket_name = "tokyo-assets-dev"

[[queues.producers]]
binding = "RENDER_SNAPSHOT_QUEUE"
queue = "instance-render-snapshot-cloud-dev"

[[queues.producers]]
binding = "L10N_GENERATE_QUEUE"
queue = "instance-l10n-generate-cloud-dev"

[[queues.consumers]]
queue = "instance-render-snapshot-cloud-dev"

[env.local]
name = "tokyo-assets-local"
vars = { BERLIN_BASE_URL = "http://localhost:3005", BERLIN_ISSUER = "http://localhost:3005", BERLIN_AUDIENCE = "clickeen.product", SANFRANCISCO_BASE_URL = "http://localhost:3002" }

[[env.local.kv_namespaces]]
binding = "USAGE_KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[env.local.kv_namespaces]]
binding = "L10N_STATE_KV"
id = "00000000000000000000000000000000"

[[env.local.r2_buckets]]
binding = "TOKYO_R2"
bucket_name = "tokyo-assets-dev"

[[env.local.queues.producers]]
binding = "RENDER_SNAPSHOT_QUEUE"
queue = "instance-render-snapshot-local"

[[env.local.queues.consumers]]
queue = "instance-render-snapshot-local"
