name = "tokyo-assets-dev"
main = "src/index.ts"
compatibility_date = "2025-12-28"
compatibility_flags = ["global_fetch_strictly_public"]
workers_dev = false
routes = [
  { pattern = "dev.clk.live/*", zone_name = "clk.live" },
  { pattern = "tokyo.dev.clickeen.com/healthz", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/__internal/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/widgets/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/dieter/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/themes/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/prague/l10n/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/prague/assets/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/assets/account/*", zone_name = "clickeen.com" },
  { pattern = "tokyo.dev.clickeen.com/fonts/*", zone_name = "clickeen.com" },
]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
BERLIN_BASE_URL = "https://berlin-dev.clickeen.workers.dev"
TOKYO_PUBLIC_BASE_URL = "https://tokyo.dev.clickeen.com"
PUBLIC_SERVING_BASE_URL = "https://dev.clk.live"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "eca50e55fa2a4f94a01fb81aeebf8377"
preview_id = "b31d28eb386c4c068821e32d41fbc92a"

[[r2_buckets]]
binding = "TOKYO_R2"
bucket_name = "tokyo-assets-dev"

[[queues.producers]]
binding = "INSTANCE_TRANSLATION_JOBS"
queue = "instance-translation-jobs-dev"

[env.local]
name = "tokyo-assets-local"
vars = { BERLIN_BASE_URL = "http://localhost:3005", TOKYO_PUBLIC_BASE_URL = "http://localhost:4000", PUBLIC_SERVING_BASE_URL = "http://localhost:8791" }

[env.local.observability]
enabled = true
head_sampling_rate = 1

[[env.local.kv_namespaces]]
binding = "USAGE_KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[env.local.r2_buckets]]
binding = "TOKYO_R2"
bucket_name = "tokyo-assets-dev"

[[env.local.queues.producers]]
binding = "INSTANCE_TRANSLATION_JOBS"
queue = "instance-translation-jobs-local"
