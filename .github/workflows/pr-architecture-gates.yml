name: pr architecture gates

on:
  pull_request:
    branches: [main]
    paths:
      - "paris/**"
      - "roma/**"
      - "bob/**"
      - "tokyo/dev-server.mjs"
      - "tokyo/widgets/**"
      - "dieter/**"
      - "packages/**"
      - "scripts/**"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/pr-architecture-gates.yml"

concurrency:
  group: pr-architecture-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Compile widgets from repo Tokyo sources
        env:
          NEXT_PUBLIC_TOKYO_URL: http://127.0.0.1:4000
          BERLIN_BASE_URL: https://berlin.dev.clickeen.com
          SANFRANCISCO_BASE_URL: https://sanfrancisco.dev.clickeen.com
        run: |
          set -euo pipefail
          node tokyo/dev-server.mjs > /tmp/clickeen-tokyo-dev.log 2>&1 &
          TOKYO_PID=$!
          CK_DEV_PROFILE=source pnpm --filter @clickeen/bob dev > /tmp/clickeen-bob-dev.log 2>&1 &
          BOB_PID=$!
          cleanup() {
            kill "$BOB_PID" >/dev/null 2>&1 || true
            kill "$TOKYO_PID" >/dev/null 2>&1 || true
            wait "$BOB_PID" >/dev/null 2>&1 || true
            wait "$TOKYO_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:4000/healthz >/dev/null 2>&1 && curl -fsS http://127.0.0.1:3000/bob >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:4000/healthz >/dev/null
          curl -fsS http://127.0.0.1:3000/bob >/dev/null
          BOB_ORIGIN=http://127.0.0.1:3000 pnpm compile:widgets

      - name: Product Profile Smoke (static)
        run: |
          CK_DEV_PROFILE=product bash -n scripts/dev-up.sh
          rg -n "CK_DEV_PROFILE|--source|--product" scripts/dev-up.sh > /dev/null

      - name: Enforce Product Profile Asset/Data Plane Guards
        run: |
          rg -n "https://tokyo.dev.clickeen.com" bob/lib/env/tokyo.ts admin/src/html/tools/dev-widget-workspace.html > /dev/null
          if rg -n "if \\(isLocal\\) return 'http://localhost:4000'|NODE_ENV === 'development'.*localhost:4000" bob/lib/env/tokyo.ts admin/src/html/tools/dev-widget-workspace.html; then
            echo "[gate] Found unconditional localhost Tokyo default in product-profile files."
            exit 1
          fi
          rg -n "IS_SOURCE_PROFILE" admin/src/html/tools/dev-widget-workspace.html admin/vite.config.ts > /dev/null
          if ! rg -n "superadminUpdateDefaults\\.hidden = true|superadminUpdateTheme\\.hidden = true" admin/src/html/tools/dev-widget-workspace.html > /dev/null; then
            echo "[gate] Source-only local mutation actions are not explicitly hidden in product profile."
            exit 1
          fi
          if rg -n "TOKYO_BASE}/assets/upload|TOKYO_BASE}/widgets/upload|uploadTokyoAsset\\(" admin/src/html/tools/dev-widget-workspace.html; then
            echo "[gate] DevStudio workspace reintroduced direct Tokyo product-write path."
            exit 1
          fi
