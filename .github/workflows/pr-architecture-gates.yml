name: pr architecture gates

on:
  pull_request:
    branches: [main]
    paths:
      - "roma/**"
      - "bob/**"
      - "tokyo/product/**"
      - "tokyo/roma/**"
      - "tokyo/prague/**"
      - "tokyo/accounts/**"
      - "dieter/**"
      - "packages/**"
      - "scripts/**"
      - "supabase/**"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/pr-architecture-gates.yml"
      - ".github/workflows/supabase-migrations.yml"

concurrency:
  group: pr-architecture-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: No Local Runtime Emulation
        run: |
          if test -e scripts/dev-up.sh || test -e tokyo/dev-server.mjs || test -e scripts/dev/generate-berlin-keys.mjs; then
            echo "[gate] Reintroduced retired local runtime emulation files."
            exit 1
          fi
          if rg -n "CK_DEV_PROFILE|--source|--product|profile=source|profile=product|IS_SOURCE_PROFILE" scripts admin/src admin/functions documentation; then
            echo "[gate] Reintroduced fake local runtime profile abstraction."
            exit 1
          fi

      - name: Enforce Runtime Guards
        run: |
          if test -e tokyo/accounts; then
            echo "[gate] Reintroduced forbidden tokyo/accounts source root."
            exit 1
          fi
          if rg -n "TOKYO_BASE}/assets/upload|TOKYO_BASE}/widgets/upload|uploadTokyoAsset\\(" admin/src admin/functions; then
            echo "[gate] DevStudio workspace reintroduced direct Tokyo product-write path."
            exit 1
          fi
