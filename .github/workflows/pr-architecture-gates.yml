name: pr architecture gates

on:
  pull_request:
    branches: [main]
    paths:
      - "paris/**"
      - "roma/**"
      - "bob/**"
      - "tokyo/dev-server.mjs"
      - "tokyo/product/**"
      - "tokyo/roma/**"
      - "tokyo/prague/**"
      - "tokyo/accounts/**"
      - "dieter/**"
      - "packages/**"
      - "scripts/**"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/pr-architecture-gates.yml"

concurrency:
  group: pr-architecture-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Local Runtime Smoke (static)
        run: |
          bash -n scripts/dev-up.sh
          if rg -n "CK_DEV_PROFILE|--source|--product|profile=source|profile=product|IS_SOURCE_PROFILE" scripts/dev-up.sh admin/vite.config.ts admin/src/tools/dev-widget-workspace documentation; then
            echo "[gate] Reintroduced fake local runtime profile abstraction."
            exit 1
          fi

      - name: Enforce Canonical Local Runtime Guards
        run: |
          rg -n "http://localhost:4000" admin/src/tools/dev-widget-workspace/main.js scripts/dev-up.sh documentation/architecture/RuntimeProfiles.md > /dev/null
          if rg -n "TOKYO_BASE}/assets/upload|TOKYO_BASE}/widgets/upload|uploadTokyoAsset\\(" admin/src/html/tools/dev-widget-workspace.html; then
            echo "[gate] DevStudio workspace reintroduced direct Tokyo product-write path."
            exit 1
          fi
