name: cloud-dev runtime verify

on:
  workflow_run:
    workflows:
      - cloud-dev workers deploy
      - cloud-dev roma app verify
      - cloud-dev prague content release
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-runtime-verify
  cancel-in-progress: true

jobs:
  verify:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify Paris health
        run: |
          set -euo pipefail
          curl -fsS "https://paris.dev.clickeen.com/api/healthz" | tee /tmp/paris-health.json
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('/tmp/paris-health.json','utf8'));if(!payload||payload.up!==true){console.error('Paris health check failed', payload);process.exit(1)}"

      - name: Verify Berlin health
        run: |
          set -euo pipefail
          curl -fsS "https://berlin-dev.clickeen.workers.dev/internal/healthz" | tee /tmp/berlin-health.json
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('/tmp/berlin-health.json','utf8'));if(!payload||payload.ok!==true||payload.service!=='berlin'){console.error('Berlin health check failed', payload);process.exit(1)}"

      - name: Verify Tokyo-worker health
        run: |
          set -euo pipefail
          curl -fsS "https://tokyo.dev.clickeen.com/healthz" | tee /tmp/tokyo-worker-health.json
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('/tmp/tokyo-worker-health.json','utf8'));if(!payload||payload.up!==true){console.error('Tokyo-worker health check failed', payload);process.exit(1)}"

      - name: Verify San Francisco health
        run: |
          set -euo pipefail
          curl -fsS "https://sanfrancisco.dev.clickeen.com/healthz" | tee /tmp/sanfrancisco-health.json
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('/tmp/sanfrancisco-health.json','utf8'));if(!payload||payload.ok!==true||payload.service!=='sanfrancisco'){console.error('San Francisco health check failed', payload);process.exit(1)}"

      - name: Verify Roma reachability
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            if curl -I -fsS "https://roma.dev.clickeen.com/login" >/tmp/roma-login.head; then
              exit 0
            fi
            sleep 10
          done
          echo "Roma custom domain did not become reachable in time." >&2
          exit 1

      - name: Verify Bob reachability
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            if curl -I -fsS "https://bob.dev.clickeen.com/" >/tmp/bob-root.head; then
              exit 0
            fi
            sleep 10
          done
          echo "Bob custom domain did not become reachable in time." >&2
          exit 1

      - name: Verify Venice embed reachability
        run: |
          set -euo pipefail
          curl -I -fsS "https://venice.dev.clickeen.com/e/test" >/tmp/venice-embed.head

      - name: Verify corrected Roma auth routes
        run: |
          set -euo pipefail
          verify_route() {
            local method="$1"
            local url="$2"
            local expected_status="$3"
            local body_file
            body_file="$(mktemp)"
            local status
            status="$(curl -sS -o "$body_file" -w '%{http_code}' -X "$method" "$url")"
            if [[ "$status" != "$expected_status" ]]; then
              echo "Unexpected status for $method $url: $status" >&2
              cat "$body_file" >&2
              exit 1
            fi
            node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));if(!payload?.error||payload.error.kind!=='AUTH'||payload.error.reasonKey!=='coreui.errors.auth.required'){console.error('Unexpected payload',payload);process.exit(1)}" "$body_file"
            rm -f "$body_file"
          }
          verify_route GET "https://roma.dev.clickeen.com/api/account/widgets" 401
          verify_route POST "https://roma.dev.clickeen.com/api/account/instances/does-not-matter/publish" 401

      - name: Verify authenticated Roma account asset lane
        env:
          CLOUD_DEV_SMOKE_EMAIL: ${{ secrets.CLOUD_DEV_SMOKE_EMAIL }}
          CLOUD_DEV_SMOKE_PASSWORD: ${{ secrets.CLOUD_DEV_SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUD_DEV_SMOKE_EMAIL:-}" || -z "${CLOUD_DEV_SMOKE_PASSWORD:-}" ]]; then
            echo "Missing CLOUD_DEV_SMOKE_EMAIL or CLOUD_DEV_SMOKE_PASSWORD." >&2
            exit 1
          fi

          cookie_jar="$(mktemp)"
          login_body="$(mktemp)"
          bootstrap_body="$(mktemp)"
          list_body="$(mktemp)"
          upload_body="$(mktemp)"
          delete_body="$(mktemp)"
          tmp_asset="$(mktemp)"

          node -e "process.stdout.write(JSON.stringify({email:process.env.CLOUD_DEV_SMOKE_EMAIL,password:process.env.CLOUD_DEV_SMOKE_PASSWORD}))" > /tmp/roma-smoke-login.json

          login_status="$(curl -sS -c "$cookie_jar" -o "$login_body" -w '%{http_code}' \
            -X POST "https://roma.dev.clickeen.com/api/session/login" \
            -H 'content-type: application/json' \
            --data-binary @/tmp/roma-smoke-login.json)"
          if [[ "$login_status" != "200" ]]; then
            echo "Smoke login failed with status $login_status" >&2
            cat "$login_body" >&2
            exit 1
          fi

          bootstrap_status="$(curl -sS -b "$cookie_jar" -o "$bootstrap_body" -w '%{http_code}' \
            "https://roma.dev.clickeen.com/api/bootstrap")"
          if [[ "$bootstrap_status" != "200" ]]; then
            echo "Bootstrap failed with status $bootstrap_status" >&2
            cat "$bootstrap_body" >&2
            exit 1
          fi

          ACCOUNT_ID="$(node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const id=payload?.activeAccount?.accountId;if(!id){console.error('Missing activeAccount.accountId');process.exit(1)}process.stdout.write(String(id));" "$bootstrap_body")"
          ACCOUNT_CAPSULE="$(node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const token=payload?.authz?.accountCapsule;if(!token){console.error('Missing authz.accountCapsule');process.exit(1)}process.stdout.write(String(token));" "$bootstrap_body")"

          list_status="$(curl -sS -b "$cookie_jar" -o "$list_body" -w '%{http_code}' \
            "https://roma.dev.clickeen.com/api/account/assets?limit=1" \
            -H "x-ck-authz-capsule: ${ACCOUNT_CAPSULE}")"
          if [[ "$list_status" != "200" ]]; then
            echo "Asset list failed with status $list_status" >&2
            cat "$list_body" >&2
            exit 1
          fi

          public_control_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://tokyo.dev.clickeen.com/__internal/assets/account/${ACCOUNT_ID}")"
          case "$public_control_status" in
            404|530) ;;
            *)
              echo "Public Tokyo asset control path is unexpectedly reachable (status $public_control_status)." >&2
              exit 1
              ;;
          esac

          printf 'cloud-dev smoke asset %s\n' "$(date -u +%Y%m%dT%H%M%SZ)" > "$tmp_asset"
          upload_status="$(curl -sS -b "$cookie_jar" -o "$upload_body" -w '%{http_code}' \
            -X POST "https://roma.dev.clickeen.com/api/account/assets/upload" \
            -H "x-ck-authz-capsule: ${ACCOUNT_CAPSULE}" \
            -H 'content-type: text/plain' \
            -H 'x-filename: smoke-asset.txt' \
            -H 'x-source: api' \
            --data-binary @"$tmp_asset")"
          if [[ "$upload_status" != "200" ]]; then
            echo "Asset upload failed with status $upload_status" >&2
            cat "$upload_body" >&2
            exit 1
          fi

          ASSET_ID="$(node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const assetId=payload?.assetId;if(!assetId){console.error('Missing assetId in upload response');process.exit(1)}process.stdout.write(String(assetId));" "$upload_body")"

          delete_status="$(curl -sS -b "$cookie_jar" -o "$delete_body" -w '%{http_code}' \
            -X DELETE "https://roma.dev.clickeen.com/api/account/assets/${ASSET_ID}" \
            -H "x-ck-authz-capsule: ${ACCOUNT_CAPSULE}")"
          if [[ "$delete_status" != "200" ]]; then
            echo "Asset delete failed with status $delete_status" >&2
            cat "$delete_body" >&2
            exit 1
          fi
