name: cloud-dev surface reachability

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cloud-dev-runtime-verify.yml"
  workflow_run:
    workflows:
      - cloud-dev workers deploy
      - cloud-dev roma app verify
      - cloud-dev prague content release
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-surface-reachability
  cancel-in-progress: true

jobs:
  reachability:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify Berlin health
        run: |
          set -euo pipefail
          curl -fsS "https://berlin-dev.clickeen.workers.dev/internal/healthz" | tee /tmp/berlin-health.json
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('/tmp/berlin-health.json','utf8'));if(!payload||payload.ok!==true||payload.service!=='berlin'){console.error('Berlin health check failed', payload);process.exit(1)}"

      - name: Verify Tokyo-worker health
        run: |
          set -euo pipefail
          curl -fsS "https://tokyo.dev.clickeen.com/healthz" | tee /tmp/tokyo-worker-health.json
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('/tmp/tokyo-worker-health.json','utf8'));if(!payload||payload.up!==true){console.error('Tokyo-worker health check failed', payload);process.exit(1)}"

      - name: Verify San Francisco health
        run: |
          set -euo pipefail
          curl -fsS "https://sanfrancisco.dev.clickeen.com/healthz" | tee /tmp/sanfrancisco-health.json
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('/tmp/sanfrancisco-health.json','utf8'));if(!payload||payload.ok!==true||payload.service!=='sanfrancisco'){console.error('San Francisco health check failed', payload);process.exit(1)}"

      - name: Verify Roma reachability
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            if curl -I -fsS "https://roma.dev.clickeen.com/login" >/tmp/roma-login.head; then
              exit 0
            fi
            sleep 10
          done
          echo "Roma custom domain did not become reachable in time." >&2
          exit 1

      - name: Verify Bob reachability
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            if curl -I -fsS "https://bob.dev.clickeen.com/" >/tmp/bob-root.head; then
              exit 0
            fi
            sleep 10
          done
          echo "Bob custom domain did not become reachable in time." >&2
          exit 1

      - name: Verify public serving host boundary
        run: |
          set -euo pipefail
          assert_404() {
            local path="$1"
            local status
            status="$(curl -sS -o /tmp/clk-live-body -w '%{http_code}' "https://dev.clk.live${path}")"
            if [[ "$status" != "404" ]]; then
              echo "dev.clk.live must not expose ${path}; got HTTP ${status}" >&2
              cat /tmp/clk-live-body >&2
              exit 1
            fi
          }
          assert_404 "/healthz"
          assert_404 "/__internal/accounts/00000001/serving/restore-paid"
          assert_404 "/widgets/faq/spec.json"
          assert_404 "/renders/widgets/catalog.json"

      - name: Verify unauthenticated Roma route boundaries
        run: |
          set -euo pipefail
          verify_route() {
            local method="$1"
            local url="$2"
            local expected_status="$3"
            local body_file
            body_file="$(mktemp)"
            local status
            status="$(curl -sS -o "$body_file" -w '%{http_code}' -X "$method" "$url")"
            if [[ "$status" != "$expected_status" ]]; then
              echo "Unexpected status for $method $url: $status" >&2
              cat "$body_file" >&2
              exit 1
            fi
            node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));if(!payload?.error||payload.error.kind!=='AUTH'||payload.error.reasonKey!=='coreui.errors.auth.required'){console.error('Unexpected payload',payload);process.exit(1)}" "$body_file"
            rm -f "$body_file"
          }
          verify_route GET "https://roma.dev.clickeen.com/api/account/widgets" 401
          verify_route POST "https://roma.dev.clickeen.com/api/account/instances/does-not-matter/publish" 401
