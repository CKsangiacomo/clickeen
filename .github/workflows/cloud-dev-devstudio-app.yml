name: cloud-dev devstudio app deploy

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - "functions/api/devstudio/**"
      - ".github/workflows/cloud-dev-devstudio-app.yml"
      - ".github/workflows/cloud-dev-runtime-verify.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-devstudio-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build DevStudio
        run: pnpm --filter @clickeen/devstudio build

      - name: Deploy DevStudio to cloud-dev
        run: |
          pnpm -C berlin exec wrangler --cwd ../admin pages deploy dist \
            --project-name devstudio-dev \
            --branch main \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "${GITHUB_SHA}" \
            --commit-dirty=true

