name: cloud-dev prague app verify

on:
  push:
    branches: [main]
    paths:
      - "prague/src/**"
      - "prague/public/**"
      - "prague/content/**"
      - "prague/astro.config.mjs"
      - "prague/package.json"
      - "prague/tsconfig.json"
      - "tokyo/widgets/**"
      - "tokyo/l10n/prague/**"
      - "scripts/prague-l10n/**"
      - "packages/l10n/locales.json"
      - ".github/workflows/cloud-dev-prague-app.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-prague
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PUBLIC_BOB_URL: https://bob.dev.clickeen.com
      PUBLIC_PARIS_URL: https://paris.dev.clickeen.com
      PUBLIC_TOKYO_URL: https://tokyo.dev.clickeen.com
      PUBLIC_VENICE_URL: https://venice.dev.clickeen.com
      PUBLIC_ROMA_URL: https://roma.dev.clickeen.com
      PUBLIC_PRAGUE_BUILD_ID: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Prague Pages contract
        run: pnpm -C prague build
