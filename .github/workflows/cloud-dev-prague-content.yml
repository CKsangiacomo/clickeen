name: cloud-dev prague content release

on:
  push:
    branches: [main]
    paths:
      - "tokyo/prague/pages/**/*.json"
      - "tokyo/prague/assets/**"
      - "prague/content/**"
      - "packages/l10n/locales.json"
      - "scripts/prague-l10n/**"
      - "scripts/prague-blocks/**"
      - ".github/workflows/cloud-dev-prague-content.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-prague
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SANFRANCISCO_BASE_URL: ${{ secrets.SANFRANCISCO_BASE_URL }}
      AI_GRANT_HMAC_SECRET: ${{ secrets.AI_GRANT_HMAC_SECRET }}
      TOKYO_R2_BUCKET: tokyo-assets-dev

      PUBLIC_BOB_URL: https://bob.dev.clickeen.com
      PUBLIC_TOKYO_URL: https://tokyo.dev.clickeen.com
      PUBLIC_CLK_LIVE_URL: https://dev.clk.live
      PUBLIC_ROMA_URL: https://roma.dev.clickeen.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Validate Prague blocks
        run: node scripts/prague-blocks/validate.mjs

      - name: Verify Prague page sidecars
        run: pnpm prague:l10n:verify

      - name: Build Prague
        run: pnpm -C prague build
