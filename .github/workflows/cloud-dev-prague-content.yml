name: cloud-dev prague content release

on:
  push:
    branches: [main]
    paths:
      - "tokyo/prague/pages/**/*.json"
      - "tokyo/prague/l10n/**"
      - "tokyo/prague/assets/**"
      - "prague/content/**"
      - "packages/l10n/locales.json"
      - "scripts/prague-sync.mjs"
      - "scripts/prague-l10n/**"
      - "scripts/prague-blocks/**"
      - ".github/workflows/cloud-dev-prague-content.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-prague
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SANFRANCISCO_BASE_URL: ${{ secrets.SANFRANCISCO_BASE_URL }}
      AI_GRANT_HMAC_SECRET: ${{ secrets.AI_GRANT_HMAC_SECRET }}
      TOKYO_R2_BUCKET: tokyo-assets-dev

      PUBLIC_BOB_URL: https://bob.dev.clickeen.com
      PUBLIC_TOKYO_URL: https://tokyo.dev.clickeen.com
      PUBLIC_VENICE_URL: https://venice.dev.clickeen.com
      PUBLIC_ROMA_URL: https://roma.dev.clickeen.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Validate Prague blocks
        run: node scripts/prague-blocks/validate.mjs

      - name: Translate + verify + publish Prague overlays to R2 (cloud-dev)
        run: node scripts/prague-sync.mjs --publish --remote

      - name: Build Prague (includes overlay verify)
        run: pnpm -C prague build

      - name: Smoke test published Prague overlay
        run: |
          set -euo pipefail
          node <<'NODE'
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const base = String(process.env.PUBLIC_TOKYO_URL || '').replace(/\/+$/, '');
          if (!base) throw new Error('PUBLIC_TOKYO_URL is required');
          const indexUrl = `${base}/l10n/prague/widgets/faq/index.json`;
          let indexRes = null;
          for (let attempt = 1; attempt <= 30; attempt += 1) {
            indexRes = await fetch(indexUrl);
            if (indexRes.ok) break;
            if (attempt === 30) {
              throw new Error(`Missing Prague FAQ index: ${indexRes.status} ${indexUrl}`);
            }
            await sleep(10_000);
          }
          const index = await indexRes.json();
          const fingerprint = index?.layers?.locale?.lastPublishedFingerprint?.fr;
          if (!fingerprint || typeof fingerprint !== 'string') {
            throw new Error('Prague FAQ index missing fr lastPublishedFingerprint');
          }
          const overlayUrl = `${base}/l10n/prague/widgets/faq/locale/fr/${encodeURIComponent(fingerprint)}.ops.json`;
          let overlayRes = null;
          for (let attempt = 1; attempt <= 30; attempt += 1) {
            overlayRes = await fetch(overlayUrl);
            if (overlayRes.ok) break;
            if (attempt === 30) {
              throw new Error(`Missing Prague FAQ fr overlay: ${overlayRes.status} ${overlayUrl}`);
            }
            await sleep(10_000);
          }
          const overlay = await overlayRes.json();
          if (overlay?.v !== 1 || !Array.isArray(overlay.ops) || overlay.ops.length < 1) {
            throw new Error('Invalid Prague FAQ fr overlay payload');
          }
          console.log(`[prague-content] Published FAQ fr overlay ${fingerprint}`);
          NODE
