name: cloud-dev workers deploy

on:
  push:
    branches: [main]
    paths:
      - "berlin/**"
      - "sanfrancisco/**"
      - "tokyo-worker/**"
      - "supabase/migrations/**"
      - "tokyo/product/widgets/**"
      - "tokyo/product/fonts/**"
      - "tokyo/product/themes/**"
      - "tokyo/product/dieter/**"
      - "scripts/infra/**"
      - "scripts/tokyo-fonts-sync.mjs"
      - ".github/workflows/cloud-dev-workers.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_CLOUD_DEV }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF_CLOUD_DEV }}
      TOKYO_R2_BUCKET: tokyo-assets-dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Apply cloud-dev Supabase migrations
        run: |
          set -euo pipefail
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          MIGRATION_CHANGED=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              if git diff --name-only HEAD^ HEAD | grep -qE '^supabase/migrations/'; then
                MIGRATION_CHANGED=true
              fi
            else
              echo "No parent commit available for workflow_dispatch; skipping cloud-dev migration apply."
              exit 0
            fi
          elif [[ -n "${BEFORE_SHA:-}" && ! "${BEFORE_SHA:-}" =~ ^0+$ ]]; then
            if ! git cat-file -e "$BEFORE_SHA^{commit}"; then
              echo "Unable to inspect before SHA ${BEFORE_SHA}; refusing to guess migration state." >&2
              exit 1
            fi
            if git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep -qE '^supabase/migrations/'; then
              MIGRATION_CHANGED=true
            fi
          fi
          if [[ "$MIGRATION_CHANGED" != "true" ]]; then
            echo "No supabase/migrations changes in this push; skipping cloud-dev migration apply."
            exit 0
          fi
          PROJECT_REF="${SUPABASE_PROJECT_REF:-$(cat supabase/.temp/project-ref 2>/dev/null || true)}"
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN" >&2
            exit 1
          fi
          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            echo "Missing required secret: SUPABASE_DB_PASSWORD_CLOUD_DEV" >&2
            exit 1
          fi
          if [[ -z "${PROJECT_REF:-}" ]]; then
            echo "Missing SUPABASE_PROJECT_REF_CLOUD_DEV and no fallback supabase/.temp/project-ref value." >&2
            exit 1
          fi
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
          supabase db push --linked --include-all --yes

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Paris is a residual health stub and its clickeen.com route is currently
      # managed outside this workflow because the GitHub Cloudflare token does not
      # have the zone-route scope required to mutate it.
      - name: Deploy berlin-dev
        run: pnpm -C berlin run deploy

      - name: Deploy sanfrancisco-dev
        run: pnpm -C sanfrancisco run deploy

      - name: Deploy tokyo-assets-dev (tokyo-worker)
        run: pnpm -C tokyo-worker run deploy

      - name: Sync Tokyo fonts to R2 (cloud-dev)
        run: node scripts/tokyo-fonts-sync.mjs --remote
