name: cloud-dev workers deploy

on:
  push:
    branches: [main]
    paths:
      - "berlin/**"
      - "agents/product-copilot/**"
      - "agents/translation-agent/**"
      - "sanfrancisco/**"
      - "tokyo-worker/**"
      - "tokyo/product/widgets/**"
      - "tokyo/product/fonts/**"
      - "tokyo/product/themes/**"
      - "tokyo/product/dieter/**"
      - "tokyo/roma/**"
      - "dieter/**"
      - "packages/ck-contracts/**"
      - "packages/ck-policy/**"
      - "packages/l10n/**"
      - "packages/widget-shell/**"
      - "scripts/infra/**"
      - "scripts/verify/**"
      - "scripts/build-dieter.js"
      - "scripts/process-svgs.js"
      - "scripts/verify-svgs.js"
      - "scripts/tokyo-r2-deploy-sync.mjs"
      - ".github/workflows/cloud-dev-workers.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TOKYO_R2_BUCKET: tokyo-assets-dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Detect changed worker surfaces
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "berlin=true"
              echo "product_copilot=true"
              echo "translation_agent=true"
              echo "sanfrancisco=true"
              echo "tokyo=true"
              echo "tokyo_assets=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="$(git rev-list --max-parents=0 "$after")"
          fi

          changed="$(git diff --name-only "$before" "$after")"
          path_changed() {
            printf '%s\n' "$changed" | grep -Eq "$1"
          }

          berlin=false
          product_copilot=false
          translation_agent=false
          sanfrancisco=false
          tokyo=false
          tokyo_assets=false
          dieter_artifacts=false

          workflow_changed=false
          if path_changed '^\.github/workflows/cloud-dev-workers\.yml$'; then
            workflow_changed=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(berlin/|scripts/infra/)'; then
            berlin=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(agents/product-copilot/|scripts/infra/|packages/(ck-contracts|ck-policy)/)'; then
            product_copilot=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(agents/translation-agent/|scripts/infra/|packages/(ck-contracts|ck-policy|l10n)/)'; then
            translation_agent=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(sanfrancisco/|scripts/infra/|packages/(ck-contracts|ck-policy|l10n)/)'; then
            sanfrancisco=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(tokyo-worker/|scripts/infra/|packages/(ck-contracts|ck-policy|l10n|widget-shell)/)'; then
            tokyo=true
          fi

          if path_changed '^(dieter/|scripts/build-dieter\.js|scripts/process-svgs\.js|scripts/verify-svgs\.js)'; then
            dieter_artifacts=true
          fi

          if [ "$dieter_artifacts" = "true" ] || path_changed '^(tokyo/product/widgets/|tokyo/product/fonts/|tokyo/product/themes/|tokyo/product/dieter/|tokyo/roma/|scripts/tokyo-r2-deploy-sync\.mjs)'; then
            tokyo_assets=true
          fi

          {
            echo "berlin=$berlin"
            echo "product_copilot=$product_copilot"
            echo "translation_agent=$translation_agent"
            echo "sanfrancisco=$sanfrancisco"
            echo "tokyo=$tokyo"
            echo "tokyo_assets=$tokyo_assets"
            echo "dieter_artifacts=$dieter_artifacts"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy berlin-dev
        if: steps.changes.outputs.berlin == 'true'
        run: pnpm -C berlin run deploy

      - name: Deploy sanfrancisco-dev
        if: steps.changes.outputs.sanfrancisco == 'true'
        run: pnpm -C sanfrancisco run deploy

      - name: Deploy tokyo-assets-dev (tokyo-worker)
        if: steps.changes.outputs.tokyo == 'true'
        run: pnpm -C tokyo-worker run deploy

      - name: Sync tokyo-assets-dev AI grant secret
        if: steps.changes.outputs.tokyo == 'true' || steps.changes.outputs.translation_agent == 'true'
        env:
          AI_GRANT_HMAC_SECRET: ${{ secrets.AI_GRANT_HMAC_SECRET }}
        run: |
          if [ -z "$AI_GRANT_HMAC_SECRET" ]; then
            echo "Missing AI_GRANT_HMAC_SECRET GitHub secret for tokyo-assets-dev." >&2
            exit 1
          fi
          printf '%s' "$AI_GRANT_HMAC_SECRET" | pnpm -C tokyo-worker exec wrangler secret put AI_GRANT_HMAC_SECRET

      - name: Deploy product-copilot-dev
        if: steps.changes.outputs.product_copilot == 'true'
        run: pnpm -C agents/product-copilot run deploy

      - name: Deploy translation-agent-dev
        if: steps.changes.outputs.translation_agent == 'true'
        run: pnpm -C agents/translation-agent run deploy

      - name: Sync translation-agent-dev AI grant secret
        if: steps.changes.outputs.translation_agent == 'true'
        env:
          AI_GRANT_HMAC_SECRET: ${{ secrets.AI_GRANT_HMAC_SECRET }}
        run: |
          if [ -z "$AI_GRANT_HMAC_SECRET" ]; then
            echo "Missing AI_GRANT_HMAC_SECRET GitHub secret for translation-agent-dev." >&2
            exit 1
          fi
          printf '%s' "$AI_GRANT_HMAC_SECRET" | pnpm -C agents/translation-agent exec wrangler secret put AI_GRANT_HMAC_SECRET

      - name: Build Dieter deploy artifacts
        if: steps.changes.outputs.dieter_artifacts == 'true'
        run: pnpm build:dieter

      - name: Sync Tokyo deploy roots to R2 (cloud-dev)
        if: steps.changes.outputs.tokyo_assets == 'true'
        run: node scripts/tokyo-r2-deploy-sync.mjs --remote
