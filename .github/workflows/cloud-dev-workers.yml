name: cloud-dev workers deploy

on:
  push:
    branches: [main]
    paths:
      - "berlin/**"
      - "sanfrancisco/**"
      - "tokyo-worker/**"
      - "tokyo/product/widgets/**"
      - "tokyo/product/fonts/**"
      - "tokyo/product/themes/**"
      - "tokyo/product/dieter/**"
      - "tokyo/roma/**"
      - "packages/ck-contracts/**"
      - "packages/ck-policy/**"
      - "packages/l10n/**"
      - "packages/widget-shell/**"
      - "scripts/infra/**"
      - "scripts/verify/**"
      - "scripts/tokyo-r2-deploy-sync.mjs"
      - ".github/workflows/cloud-dev-workers.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TOKYO_R2_BUCKET: tokyo-assets-dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Detect changed worker surfaces
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "berlin=true"
              echo "sanfrancisco=true"
              echo "tokyo=true"
              echo "tokyo_assets=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="$(git rev-list --max-parents=0 "$after")"
          fi

          changed="$(git diff --name-only "$before" "$after")"
          path_changed() {
            printf '%s\n' "$changed" | grep -Eq "$1"
          }

          berlin=false
          sanfrancisco=false
          tokyo=false
          tokyo_assets=false

          workflow_changed=false
          if path_changed '^\.github/workflows/cloud-dev-workers\.yml$'; then
            workflow_changed=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(berlin/|scripts/infra/)'; then
            berlin=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(sanfrancisco/|scripts/infra/|packages/(ck-contracts|ck-policy|l10n)/)'; then
            sanfrancisco=true
          fi

          if [ "$workflow_changed" = "true" ] || path_changed '^(tokyo-worker/|scripts/infra/|packages/(ck-contracts|ck-policy|l10n|widget-shell)/)'; then
            tokyo=true
          fi

          if path_changed '^(tokyo/product/widgets/|tokyo/product/fonts/|tokyo/product/themes/|tokyo/product/dieter/|tokyo/roma/|scripts/tokyo-r2-deploy-sync\.mjs)'; then
            tokyo_assets=true
          fi

          {
            echo "berlin=$berlin"
            echo "sanfrancisco=$sanfrancisco"
            echo "tokyo=$tokyo"
            echo "tokyo_assets=$tokyo_assets"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy berlin-dev
        if: steps.changes.outputs.berlin == 'true'
        run: pnpm -C berlin run deploy

      - name: Deploy sanfrancisco-dev
        if: steps.changes.outputs.sanfrancisco == 'true'
        run: pnpm -C sanfrancisco run deploy

      - name: Deploy tokyo-assets-dev (tokyo-worker)
        if: steps.changes.outputs.tokyo == 'true'
        run: |
          upload_output="$(pnpm -C tokyo-worker exec wrangler versions upload --message "$GITHUB_SHA")"
          printf '%s\n' "$upload_output"
          version_id="$(printf '%s\n' "$upload_output" | awk '/Worker Version ID:/ {print $4}')"
          if [ -z "$version_id" ]; then
            echo "Tokyo-worker version upload did not return a Worker Version ID." >&2
            exit 1
          fi
          pnpm -C tokyo-worker exec wrangler versions deploy "${version_id}@100" --yes

      - name: Sync Tokyo deploy roots to R2 (cloud-dev)
        if: steps.changes.outputs.tokyo == 'true' || steps.changes.outputs.tokyo_assets == 'true'
        run: node scripts/tokyo-r2-deploy-sync.mjs --remote
