name: cloud-dev workers deploy

on:
  push:
    branches: [main]
    paths:
      - "berlin/**"
      - "sanfrancisco/**"
      - "tokyo-worker/**"
      - "tokyo/product/widgets/**"
      - "tokyo/product/fonts/**"
      - "tokyo/product/themes/**"
      - "tokyo/product/dieter/**"
      - "scripts/infra/**"
      - "scripts/verify/**"
      - "scripts/tokyo-fonts-sync.mjs"
      - ".github/workflows/cloud-dev-workers.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TOKYO_R2_BUCKET: tokyo-assets-dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Deploy berlin-dev
        run: pnpm -C berlin run deploy

      - name: Deploy sanfrancisco-dev
        run: pnpm -C sanfrancisco run deploy

      - name: Deploy tokyo-assets-dev (tokyo-worker)
        run: pnpm -C tokyo-worker run deploy

      - name: Sync Tokyo fonts to R2 (cloud-dev)
        run: node scripts/tokyo-fonts-sync.mjs --remote
