name: cloud-dev roma app verify

on:
  push:
    branches: [main]
    paths:
      - "roma/**"
      - "bob/**"
      - "tokyo/dev-server.mjs"
      - "tokyo/widgets/**"
      - "dieter/**"
      - "packages/**"
      - "scripts/build-bob-cf.mjs"
      - "scripts/build-roma-cf.mjs"
      - "scripts/compile-all-widgets.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "supabase/migrations/**"
      - ".github/workflows/cloud-dev-roma-app.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-roma
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_CLOUD_DEV }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF_CLOUD_DEV }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL_CLOUD_DEV }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_CLOUD_DEV }}

      NEXT_PUBLIC_TOKYO_URL: https://tokyo.dev.clickeen.com
      BERLIN_BASE_URL: https://berlin.dev.clickeen.com
      SANFRANCISCO_BASE_URL: https://sanfrancisco.dev.clickeen.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Apply cloud-dev Supabase migrations
        run: |
          set -euo pipefail
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              if ! git diff --name-only HEAD^ HEAD | grep -qE '^supabase/migrations/'; then
                echo "No supabase/migrations changes in current HEAD; skipping cloud-dev migration apply."
                exit 0
              fi
            else
              echo "No parent commit available for workflow_dispatch; skipping cloud-dev migration apply."
              exit 0
            fi
          elif [[ -n "${BEFORE_SHA:-}" && ! "${BEFORE_SHA:-}" =~ ^0+$ ]]; then
            if ! git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep -qE '^supabase/migrations/'; then
              echo "No supabase/migrations changes in this push; skipping cloud-dev migration apply."
              exit 0
            fi
          fi
          PROJECT_REF="${SUPABASE_PROJECT_REF:-$(cat supabase/.temp/project-ref 2>/dev/null || true)}"
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN" >&2
            exit 1
          fi
          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            echo "Missing required secret: SUPABASE_DB_PASSWORD_CLOUD_DEV" >&2
            exit 1
          fi
          if [[ -z "${PROJECT_REF:-}" ]]; then
            echo "Missing SUPABASE_PROJECT_REF_CLOUD_DEV and no fallback supabase/.temp/project-ref value." >&2
            exit 1
          fi
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
          supabase db push --linked --include-all --yes

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Compile widgets
        env:
          NEXT_PUBLIC_TOKYO_URL: http://127.0.0.1:4000
        run: |
          set -euo pipefail
          node tokyo/dev-server.mjs > /tmp/clickeen-tokyo-dev.log 2>&1 &
          TOKYO_PID=$!
          CK_DEV_PROFILE=source pnpm --filter @clickeen/bob dev > /tmp/clickeen-bob-dev.log 2>&1 &
          BOB_PID=$!
          cleanup() {
            kill "$BOB_PID" >/dev/null 2>&1 || true
            kill "$TOKYO_PID" >/dev/null 2>&1 || true
            wait "$BOB_PID" >/dev/null 2>&1 || true
            wait "$TOKYO_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:4000/healthz >/dev/null 2>&1 && curl -fsS http://127.0.0.1:3000/bob >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:4000/healthz >/dev/null
          curl -fsS http://127.0.0.1:3000/bob >/dev/null
          BOB_ORIGIN=http://127.0.0.1:3000 pnpm compile:widgets

      - name: Build Bob Pages contract
        run: pnpm -C bob build:cf

      - name: Build Roma Pages contract
        run: pnpm -C roma build:cf
