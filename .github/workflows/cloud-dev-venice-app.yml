name: cloud-dev venice app verify

on:
  push:
    branches: [main]
    paths:
      - "venice/**"
      - "scripts/build-venice-cf.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/cloud-dev-venice-app.yml"
  workflow_dispatch: {}

concurrency:
  group: cloud-dev-venice
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PARIS_URL: https://paris.dev.clickeen.com
      NEXT_PUBLIC_TOKYO_URL: https://tokyo.dev.clickeen.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: {}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Venice Pages contract
        run: pnpm -C venice build:cf
