name: supabase migrations deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target Supabase environment
        required: true
        type: choice
        options:
          - cloud-dev
      confirm:
        description: Type APPLY_MIGRATIONS to deploy reviewed migrations
        required: true
        type: string
      repair_applied_versions:
        description: Optional comma-separated migration versions to mark applied before push
        required: false
        type: string
        default: ""

concurrency:
  group: supabase-migrations-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ inputs.confirm == 'APPLY_MIGRATIONS' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL_CLOUD_DEV }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Select Supabase target
        id: target
        shell: bash
        run: |
          case "${{ inputs.target }}" in
            cloud-dev)
              project_ref=$(node -e 'console.log(new URL(process.env.SUPABASE_URL).hostname.split(".")[0])')
              ;;
            *)
              echo "Unknown target: ${{ inputs.target }}" >&2
              exit 1
              ;;
          esac

          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL for ${{ inputs.target }}. Configure the existing SUPABASE_URL_CLOUD_DEV repo variable." >&2
            exit 1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Missing SUPABASE_DB_PASSWORD secret for Supabase CLI migration deployment." >&2
            exit 1
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret" >&2
            exit 1
          fi

          echo "project_ref=$project_ref" >> "$GITHUB_OUTPUT"
          echo "SUPABASE_PROJECT_REF=$project_ref" >> "$GITHUB_ENV"

      - name: Link Supabase project
        run: supabase link --project-ref "${{ steps.target.outputs.project_ref }}"

      - name: Repair reviewed migration history
        if: ${{ inputs.repair_applied_versions != '' }}
        shell: bash
        run: |
          IFS=',' read -ra versions <<< "${{ inputs.repair_applied_versions }}"
          for raw_version in "${versions[@]}"; do
            version="$(echo "$raw_version" | xargs)"
            if [ -n "$version" ]; then
              supabase migration repair "$version" --status applied --linked
            fi
          done

      - name: Deploy reviewed migrations
        run: supabase db push --linked
