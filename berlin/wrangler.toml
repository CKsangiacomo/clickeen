name = "berlin-dev"
main = "src/index.ts"
compatibility_date = "2025-12-28"
workers_dev = true
routes = [
  { pattern = "berlin.dev.clickeen.com/*", zone_name = "clickeen.com" },
]

[vars]
BERLIN_ISSUER = "https://berlin-dev.clickeen.workers.dev"
BERLIN_AUDIENCE = "clickeen.product"
BERLIN_LOGIN_CALLBACK_URL = "https://berlin-dev.clickeen.workers.dev/auth/login/provider/callback"
BERLIN_FINISH_REDIRECT_URL = "https://roma.dev.clickeen.com/api/session/finish"
ENV_STAGE = "cloud-dev"

[[kv_namespaces]]
binding = "BERLIN_SESSION_KV"
id = "a9396f7fee7f47bc9b1be520c78a24c9"
preview_id = "4d253b94b6b5434ab484cfe4a3a0fb9a"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "eca50e55fa2a4f94a01fb81aeebf8377"
preview_id = "b31d28eb386c4c068821e32d41fbc92a"

[[queues.producers]]
binding = "RENDER_SNAPSHOT_QUEUE"
queue = "instance-render-snapshot-cloud-dev"

[[durable_objects.bindings]]
name = "BERLIN_AUTH_TICKETS"
class_name = "BerlinAuthTicketDO"

[env.local]
name = "berlin-local"
vars = { BERLIN_ISSUER = "http://localhost:3005", BERLIN_AUDIENCE = "clickeen.product", BERLIN_FINISH_REDIRECT_URL = "http://localhost:3000/api/session/finish", ENV_STAGE = "local" }

[[env.local.kv_namespaces]]
binding = "BERLIN_SESSION_KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[env.local.kv_namespaces]]
binding = "USAGE_KV"
id = "11111111111111111111111111111111"
preview_id = "11111111111111111111111111111111"

[[env.local.queues.producers]]
binding = "RENDER_SNAPSHOT_QUEUE"
queue = "instance-render-snapshot-local"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BerlinAuthTicketDO"]
