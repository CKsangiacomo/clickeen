name = "berlin-dev"
main = "src/index.ts"
compatibility_date = "2025-12-28"
workers_dev = true
routes = [
  { pattern = "berlin.dev.clickeen.com", zone_name = "clickeen.com", custom_domain = true },
]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
BERLIN_ISSUER = "https://berlin-dev.clickeen.workers.dev"
BERLIN_AUDIENCE = "clickeen.product"
BERLIN_GOOGLE_CALLBACK_URL = "https://berlin.dev.clickeen.com/auth/login/google/callback"
BERLIN_FINISH_REDIRECT_URL = "https://roma.dev.clickeen.com/api/session/finish"
BERLIN_ALLOWED_FINISH_REDIRECT_URLS = "https://devstudio.clickeen.com/api/session/finish"
BERLIN_ALLOWED_PROVIDERS = "google"
ENV_STAGE = "cloud-dev"
E2E_AUTH_ENABLED = "true"
E2E_ALLOWED_EMAILS = "playwright@clickeen.com"

[[kv_namespaces]]
binding = "BERLIN_SESSION_KV"
id = "bf40f9bee2f74772ad7f0e9fb640ee29"
preview_id = "fa868bb00ba04b7d83e215a6d4652c31"

[[queues.producers]]
binding = "RENDER_SNAPSHOT_QUEUE"
queue = "instance-render-snapshot-cloud-dev"

[[durable_objects.bindings]]
name = "BERLIN_AUTH_TICKETS"
class_name = "BerlinAuthTicketDO"

[env.local]
name = "berlin-local"
vars = { BERLIN_ISSUER = "http://localhost:3005", BERLIN_AUDIENCE = "clickeen.product", BERLIN_GOOGLE_CALLBACK_URL = "http://localhost:3005/auth/login/google/callback", BERLIN_FINISH_REDIRECT_URL = "http://localhost:3000/api/session/finish", BERLIN_ALLOWED_PROVIDERS = "google", ENV_STAGE = "local" }

[env.local.observability]
enabled = true
head_sampling_rate = 1

[[env.local.kv_namespaces]]
binding = "BERLIN_SESSION_KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[env.local.queues.producers]]
binding = "RENDER_SNAPSHOT_QUEUE"
queue = "instance-render-snapshot-local"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BerlinAuthTicketDO"]
