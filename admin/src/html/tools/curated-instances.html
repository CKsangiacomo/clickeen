<style>
  .curated-tool {
    display: grid;
    gap: var(--space-4);
  }

  .curated-tool__toolbar {
    display: grid;
    gap: var(--space-2);
    grid-template-columns: 1fr;
  }

  .curated-tool__row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--space-2);
  }

  .curated-tool__field {
    display: grid;
    gap: 6px;
    min-inline-size: min(520px, 100%);
  }

  .curated-tool__label {
    color: color-mix(in oklab, var(--color-text), transparent 35%);
  }

  .curated-tool__input,
  .curated-tool__select {
    inline-size: 100%;
    min-block-size: var(--control-size-md, 2.5rem);
    padding: 8px 10px;
    border-radius: var(--control-radius-md, 0.375rem);
    border: 1px solid color-mix(in oklab, var(--role-border), transparent 15%);
    background: var(--color-system-white);
    color: var(--color-text);
    font: 500 var(--fs-11) / var(--lh-tight) var(--font-ui);
    letter-spacing: -0.01em;
  }

  .curated-tool__input:focus-visible,
  .curated-tool__select:focus-visible {
    outline: 2px solid var(--focus-ring-color, var(--color-system-blue));
    outline-offset: 2px;
  }

  .curated-tool__btn {
    min-block-size: var(--control-size-md, 2.5rem);
    padding: 8px 12px;
    border-radius: var(--control-radius-md, 0.375rem);
    border: 1px solid color-mix(in oklab, var(--role-border), transparent 15%);
    background: color-mix(in oklab, var(--role-surface-bg, var(--role-surface)), var(--color-system-white) 12%);
    color: var(--color-text);
    font: 600 var(--fs-11) / var(--lh-tight) var(--font-ui);
    letter-spacing: -0.01em;
    cursor: pointer;
  }

  .curated-tool__btn:hover {
    background: color-mix(in oklab, var(--role-surface-bg, var(--role-surface)), var(--color-system-blue) 8%);
  }

  .curated-tool__btn:focus-visible {
    outline: 2px solid var(--focus-ring-color, var(--color-system-blue));
    outline-offset: 2px;
  }

  .curated-tool__note {
    color: color-mix(in oklab, var(--color-text), transparent 40%);
  }

  .curated-tool__error {
    padding: var(--space-3);
    border-radius: var(--control-radius-lg);
    border: 1px solid color-mix(in oklab, var(--color-system-red), transparent 65%);
    background: color-mix(in oklab, var(--color-system-red), white 92%);
    color: var(--color-text);
  }

  .curated-tool__iframe {
    inline-size: 100%;
    block-size: min(78vh, 920px);
    border-radius: var(--control-radius-lg);
    border: 1px solid color-mix(in oklab, var(--role-border), transparent 20%);
    background: var(--color-system-white);
  }

  .curated-tool__links {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--space-2);
  }

  .curated-tool__link {
    color: var(--color-system-blue-contrast);
    text-decoration: none;
    font: 600 var(--fs-11) / var(--lh-tight) var(--font-ui);
  }

  .curated-tool__link:hover {
    text-decoration: underline;
  }
</style>

<h1 class="heading-2 ck-m0">Curated Instances</h1>

<div class="curated-tool">
  <div class="devstudio-page-section">
    <div class="curated-tool__toolbar">
      <div class="curated-tool__row">
        <button type="button" class="curated-tool__btn" id="curated-refresh">Refresh list</button>
        <span class="body-s curated-tool__note" id="curated-status"></span>
      </div>

      <div class="curated-tool__field">
        <label class="label-s curated-tool__label" for="curated-filter">Filter</label>
        <input class="curated-tool__input" id="curated-filter" placeholder="Search by name, widget type, or publicId" />
      </div>

      <div class="curated-tool__field">
        <label class="label-s curated-tool__label" for="curated-select">Curated instance</label>
        <select class="curated-tool__select" id="curated-select"></select>
      </div>

      <div class="curated-tool__links">
        <a class="curated-tool__link" id="curated-open-tab" href="#" target="_blank" rel="noreferrer">Open editor in new tab</a>
        <span class="body-s curated-tool__note" id="curated-context"></span>
      </div>

      <div class="curated-tool__error body-s" id="curated-error" style="display:none"></div>
    </div>
  </div>

  <div class="devstudio-page-section">
    <iframe class="curated-tool__iframe" id="curated-bob" title="Bob editor" loading="lazy"></iframe>
  </div>
</div>

<script type="module">
  const ADMIN_ACCOUNT_ID = '00000000-0000-0000-0000-000000000100';
  const DEFAULT_BOB_BASE_URL = 'http://localhost:3000';

  const state = {
    loading: false,
    instances: [],
    filter: '',
    selectedPublicId: '',
    lastError: null,
    lastLoadedAt: null,
  };

  const refreshBtn = document.getElementById('curated-refresh');
  const statusNode = document.getElementById('curated-status');
  const filterInput = document.getElementById('curated-filter');
  const select = document.getElementById('curated-select');
  const iframe = document.getElementById('curated-bob');
  const errorNode = document.getElementById('curated-error');
  const openTabLink = document.getElementById('curated-open-tab');
  const contextNode = document.getElementById('curated-context');

  const asString = (value) => (typeof value === 'string' ? value.trim() : '');

  const bobBaseUrl = (() => {
    const host = window.location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return DEFAULT_BOB_BASE_URL;
    return DEFAULT_BOB_BASE_URL;
  })();

  const setStatus = (next) => {
    Object.assign(state, next);
    render();
  };

  function formatTime(date) {
    if (!(date instanceof Date)) return '';
    if (!Number.isFinite(date.getTime())) return '';
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function matchesFilter(instance, filter) {
    const f = String(filter || '').trim().toLowerCase();
    if (!f) return true;
    const publicId = asString(instance?.publicId).toLowerCase();
    const widgetname = asString(instance?.widgetname).toLowerCase();
    const displayName = asString(instance?.displayName).toLowerCase();
    return publicId.includes(f) || widgetname.includes(f) || displayName.includes(f);
  }

  function buildEditorUrl(publicId) {
    const pid = asString(publicId);
    if (!pid) return '';
    const url = new URL(`${bobBaseUrl.replace(/\\/+$/, '')}/bob`);
    url.searchParams.set('boot', 'url');
    url.searchParams.set('subject', 'account');
    url.searchParams.set('accountId', ADMIN_ACCOUNT_ID);
    url.searchParams.set('publicId', pid);
    url.searchParams.set('_t', String(Date.now()));
    return url.toString();
  }

  function render() {
    const error = state.lastError ? String(state.lastError) : '';
    if (error) {
      errorNode.style.display = 'block';
      errorNode.textContent = error;
    } else {
      errorNode.style.display = 'none';
      errorNode.textContent = '';
    }

    refreshBtn.disabled = state.loading;
    filterInput.disabled = state.loading;
    select.disabled = state.loading;

    const filtered = state.instances.filter((inst) => matchesFilter(inst, state.filter));
    const hasSelection = Boolean(state.selectedPublicId);

    const lastLoaded = state.lastLoadedAt ? `Last loaded: ${formatTime(state.lastLoadedAt)}.` : '';
    statusNode.textContent = state.loading ? 'Loading curated instances…' : `${filtered.length} shown. ${lastLoaded}`.trim();

    // Preserve selection if it still exists after filtering.
    const selectedStillVisible = filtered.some((inst) => asString(inst.publicId) === asString(state.selectedPublicId));
    const nextSelectedPublicId = selectedStillVisible ? state.selectedPublicId : asString(filtered[0]?.publicId || '');
    if (nextSelectedPublicId !== state.selectedPublicId) {
      state.selectedPublicId = nextSelectedPublicId;
    }

    select.innerHTML = '';
    filtered.forEach((inst) => {
      const publicId = asString(inst.publicId);
      if (!publicId) return;
      const displayName = asString(inst.displayName) || publicId;
      const widgetname = asString(inst.widgetname) || 'unknown';
      const option = document.createElement('option');
      option.value = publicId;
      option.textContent = `${displayName} — ${widgetname} — ${publicId}`;
      if (publicId === state.selectedPublicId) option.selected = true;
      select.append(option);
    });

    const editorUrl = buildEditorUrl(state.selectedPublicId);
    openTabLink.href = editorUrl || '#';
    openTabLink.style.pointerEvents = editorUrl ? 'auto' : 'none';
    openTabLink.style.opacity = editorUrl ? '1' : '0.5';

    contextNode.textContent = hasSelection
      ? `Editing as admin account ${ADMIN_ACCOUNT_ID}. Bob base: ${bobBaseUrl}.`
      : `Start your local stack (scripts/dev-up.sh). Bob base: ${bobBaseUrl}.`;

    if (!editorUrl) {
      iframe.removeAttribute('src');
      return;
    }
    if (iframe.getAttribute('src') !== editorUrl) {
      iframe.setAttribute('src', editorUrl);
    }
  }

  async function loadCuratedInstances() {
    setStatus({ loading: true, lastError: null });
    try {
      const url = `${bobBaseUrl.replace(/\\/+$/, '')}/api/paris/curated-instances?includeConfig=0&_t=${Date.now()}`;
      const res = await fetch(url, { method: 'GET', cache: 'no-store' });
      const json = await res.json().catch(() => null);
      if (!res.ok) {
        const message = json?.error?.detail || json?.error?.reasonKey || json?.error || `HTTP_${res.status}`;
        throw new Error(String(message));
      }
      const instances = Array.isArray(json?.instances) ? json.instances : [];
      setStatus({ instances, lastLoadedAt: new Date(), loading: false, lastError: null });
    } catch (err) {
      setStatus({ loading: false, lastError: err instanceof Error ? err.message : String(err) });
    }
  }

  refreshBtn.addEventListener('click', () => void loadCuratedInstances());
  filterInput.addEventListener('input', (event) => setStatus({ filter: event.target.value || '' }));
  select.addEventListener('change', (event) => setStatus({ selectedPublicId: String(event.target.value || '').trim() }));

  loadCuratedInstances();
</script>
