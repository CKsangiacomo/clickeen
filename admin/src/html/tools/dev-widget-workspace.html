  <script type="module">
    // This page is rendered inside DevStudio’s SPA shell. When navigating between tools,
    // DevStudio swaps DOM but does not automatically remove global event listeners.
    // Use an AbortController keyed on `window` so re-entering this tool page doesn't
    // accumulate listeners and spam postMessage loops.
    const CK_DEV_INSTANCES_ABORT_KEY = '__CK_DEV_INSTANCES_ABORT__';
    try {
      const prev = window[CK_DEV_INSTANCES_ABORT_KEY];
      if (prev && typeof prev.abort === 'function') prev.abort();
    } catch {}
    const abortController = new AbortController();
    try {
      window[CK_DEV_INSTANCES_ABORT_KEY] = abortController;
    } catch {}

    const PROFILE = (() => {
      const params = new URLSearchParams(window.location.search);
      const raw = (params.get('profile') || 'product').trim().toLowerCase();
      return raw === 'source' ? 'source' : 'product';
    })();
    const IS_SOURCE_PROFILE = PROFILE === 'source';
    const SUPPORT_TARGET_STORAGE_KEY = 'ck.devstudio.supportTargetEnvelope.v1';

    function resolveHashSearchParams() {
      const hash = String(window.location.hash || '');
      const queryIndex = hash.indexOf('?');
      if (queryIndex === -1) return new URLSearchParams();
      return new URLSearchParams(hash.slice(queryIndex + 1));
    }

    function readSupportTargetEnvelopeFromStorage() {
      const raw = window.sessionStorage.getItem(SUPPORT_TARGET_STORAGE_KEY);
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function writeSupportTargetEnvelopeToStorage(nextValue) {
      if (!nextValue || typeof nextValue !== 'object' || Array.isArray(nextValue)) return;
      window.sessionStorage.setItem(SUPPORT_TARGET_STORAGE_KEY, JSON.stringify(nextValue));
    }

    const HASH_PARAMS = resolveHashSearchParams();
    const SUPPORT_MODE = HASH_PARAMS.get('support') === '1';

    function requireBobOrigin() {
      const params = new URLSearchParams(window.location.search);
      const defaultBob = 'http://localhost:3000';
      const raw = (params.get('bob') || defaultBob).trim();
      try {
        return new URL(raw).origin;
      } catch {
        throw new Error(`Invalid ?bob= origin: "${raw}"`);
      }
    }

    const BOB_ORIGIN = requireBobOrigin();

    function resolveTokyoBaseUrl() {
      // Keep in sync with bob/lib/env/tokyo.ts (plain JS variant for DevStudio tools).
      // product profile: cloud-dev Tokyo (default)
      // source profile: local Tokyo (explicit low-level service development)
      const params = new URLSearchParams(window.location.search);
      const profile = PROFILE;
      const raw = (params.get('tokyo') || '').trim();
      if (raw) {
        try {
          return new URL(raw).origin;
        } catch {}
      }
      if (profile === 'source') return 'http://localhost:4000';
      return 'https://tokyo.dev.clickeen.com';
    }

    const TOKYO_BASE = resolveTokyoBaseUrl();
    const DEFAULT_INSTANCE_DISPLAY_NAME = 'Untitled widget';
    const LOCAL_DEFAULT_INSTANCE_PREFIX = 'devstudio_local_';
    const SUPPORT_STATUS_VALUE = 'Manual';
    const SUPPORT_STATUS_META = 'Support path does not poll translation status.';
    let currentPublicId = null;
    let selectedWidgetSlug = null;
    let widgetTypes = [];
    let storedInstances = [];
    let instances = [];
    let isOpen = false;
    let bobSessionId = '';
    let supportTarget = SUPPORT_MODE ? readSupportTargetEnvelopeFromStorage() : null;
    const isLocalDevStudio =
      window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

    const dropdown = document.getElementById('instance-dropdown');
    const widgetSelector = document.getElementById('widget-selector');
    const widgetSelect = document.getElementById('widget-select');
    const control = document.getElementById('instance-dropdown-control');
    const valueField = document.getElementById('instance-dropdown-value');

    function buildBobApiUrl(pathname, searchParams = {}) {
      const url = new URL(pathname, BOB_ORIGIN);
      Object.entries(searchParams).forEach(([key, value]) => {
        if (value == null || value === '') return;
        url.searchParams.set(key, String(value));
      });
      return url.toString();
    }

    function fetchBob(url, init = {}) {
      const requestInit = { ...init };
      if (!Object.prototype.hasOwnProperty.call(requestInit, 'credentials')) {
        requestInit.credentials = 'include';
      }
      if (!Object.prototype.hasOwnProperty.call(requestInit, 'mode')) {
        requestInit.mode = 'cors';
      }
      return fetch(url, requestInit);
    }

    function buildDevStudioApiUrl(pathname, searchParams = {}) {
      const url = new URL(pathname, window.location.origin);
      Object.entries(searchParams).forEach(([key, value]) => {
        if (value == null || value === '') return;
        url.searchParams.set(key, String(value));
      });
      return url.toString();
    }

    function fetchDevStudio(url, init = {}) {
      return fetch(url, { cache: 'no-store', ...init });
    }

    async function loadDevStudioContext() {
      if (devstudioContextPromise) return devstudioContextPromise;
      devstudioContextPromise = (async () => {
        const res = await fetchDevStudio(buildDevStudioApiUrl('/api/devstudio/context'));
        const payload = await res.json().catch(() => null);
        if (!res.ok) {
          const reasonKey = payload?.error?.reasonKey || payload?.error || `HTTP_${res.status}`;
          throw new Error(String(reasonKey));
        }
        const accountId =
          typeof payload?.accountId === 'string' && payload.accountId.trim()
            ? payload.accountId.trim()
            : '';
        if (!accountId) {
          throw new Error('coreui.errors.auth.contextUnavailable');
        }
        return { accountId };
      })().catch((error) => {
        devstudioContextPromise = null;
        throw error;
      });
      return devstudioContextPromise;
    }

    async function resolveDevStudioAccountId() {
      if (
        SUPPORT_MODE &&
        supportTarget &&
        typeof supportTarget.accountId === 'string' &&
        supportTarget.accountId.trim()
      ) {
        return supportTarget.accountId.trim();
      }
      const context = await loadDevStudioContext();
      return context.accountId;
    }

    function buildSupportInstance(envelope) {
      if (!envelope || typeof envelope !== 'object' || Array.isArray(envelope)) return null;
      const publicId =
        typeof envelope.publicId === 'string' && envelope.publicId.trim()
          ? envelope.publicId.trim()
          : null;
      const widgetType =
        typeof envelope.widgetType === 'string' && envelope.widgetType.trim()
          ? envelope.widgetType.trim()
          : null;
      if (!publicId || !widgetType) return null;
      const widgetSlug = normalizeWidgetname(widgetType);
      if (!widgetSlug) return null;
      const label =
        typeof envelope.label === 'string' && envelope.label.trim()
          ? envelope.label.trim()
          : DEFAULT_INSTANCE_DISPLAY_NAME;
      const status = envelope.status === 'published' ? 'published' : 'unpublished';
      return {
        publicId,
        widgetname: widgetSlug,
        widgetSlug,
        label,
        status,
        source: 'support',
        actions: null,
        config: envelope.config && typeof envelope.config === 'object' ? envelope.config : null,
        localization:
          envelope.localization && typeof envelope.localization === 'object' ? envelope.localization : null,
        policy: envelope.policy && typeof envelope.policy === 'object' ? envelope.policy : null,
        meta: {
          accountId:
            typeof envelope.accountId === 'string' && envelope.accountId.trim() ? envelope.accountId.trim() : '',
          ownerAccountId:
            typeof envelope.ownerAccountId === 'string' && envelope.ownerAccountId.trim()
              ? envelope.ownerAccountId.trim()
              : '',
          reason: typeof envelope.reason === 'string' ? envelope.reason.trim() : '',
        },
      };
    }

    async function runSupportAccountCommand({ source, requestId, sessionId, command, accountId, publicId, body }) {
      const reply = ({ ok, status, payload = null, message = undefined }) => {
        source.postMessage(
          {
            type: 'host:account-command-result',
            requestId,
            sessionId,
            command,
            accountId,
            publicId,
            ok,
            status,
            payload,
            ...(message ? { message } : {}),
          },
          BOB_ORIGIN,
        );
      };

      if (!supportTarget || publicId !== supportTarget.publicId || accountId !== supportTarget.accountId) {
        reply({
          ok: false,
          status: 404,
          message: 'coreui.errors.instance.notFound',
        });
        return;
      }

      if (command !== 'update-instance') {
        reply({
          ok: false,
          status: 422,
          message: 'coreui.errors.internalControl.supportCommandUnsupported',
        });
        return;
      }

      const config = body && typeof body === 'object' && !Array.isArray(body) ? body.config : null;
      if (!config || typeof config !== 'object' || Array.isArray(config)) {
        reply({
          ok: false,
          status: 422,
          message: 'coreui.errors.payload.invalid',
        });
        return;
      }

      try {
        const res = await fetchDevStudio(buildDevStudioApiUrl('/api/devstudio/control/support-update-instance'), {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            accountId,
            publicId,
            reason:
              typeof supportTarget.reason === 'string' && supportTarget.reason.trim()
                ? supportTarget.reason.trim()
                : 'customer_support',
            config,
          }),
        });
        const payload = await res.json().catch(() => null);
        if (res.ok && payload && typeof payload === 'object' && payload.config && typeof payload.config === 'object') {
          supportTarget = {
            ...supportTarget,
            config: payload.config,
          };
          writeSupportTargetEnvelopeToStorage(supportTarget);
        }
        reply({
          ok: res.ok,
          status: res.status,
          payload,
          message:
            !res.ok && payload?.error?.reasonKey
              ? String(payload.error.reasonKey)
              : !res.ok
                ? `HTTP_${res.status}`
                : undefined,
        });
      } catch (error) {
        reply({
          ok: false,
          status: 500,
          message: error instanceof Error ? error.message : String(error),
        });
      }
    }

    async function runDevstudioAccountCommand({ source, requestId, sessionId, command, accountId, publicId, locale, body }) {
      const reply = ({ ok, status, payload = null, message = undefined }) => {
        source.postMessage(
          {
            type: 'host:account-command-result',
            requestId,
            sessionId,
            command,
            accountId,
            publicId,
            ok,
            status,
            payload,
            ...(message ? { message } : {}),
          },
          BOB_ORIGIN,
        );
      };

      const devstudioAccountId = await resolveDevStudioAccountId().catch(() => '');
      if (!devstudioAccountId || accountId !== devstudioAccountId || !findInstanceByPublicId(publicId)) {
        reply({
          ok: false,
          status: 404,
          message: 'coreui.errors.instance.notFound',
        });
        return;
      }

      try {
        if (command === 'update-instance') {
          const config = body && typeof body === 'object' && !Array.isArray(body) ? body.config : null;
          if (!config || typeof config !== 'object' || Array.isArray(config)) {
            reply({
              ok: false,
              status: 422,
              message: 'coreui.errors.payload.invalid',
            });
            return;
          }

          const res = await fetchDevStudio(
            buildDevStudioApiUrl('/api/devstudio/instance', { accountId, publicId }),
            {
              method: 'PUT',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ config }),
            },
          );
          const payload = await res.json().catch(() => null);
          if (res.ok && payload && typeof payload === 'object' && payload.config && typeof payload.config === 'object') {
            const instance = findInstanceByPublicId(publicId);
            if (instance) instance.config = payload.config;
          }
          reply({
            ok: res.ok,
            status: res.status,
            payload,
            message:
              !res.ok && payload?.error?.reasonKey
                ? String(payload.error.reasonKey)
                : !res.ok
                  ? `HTTP_${res.status}`
                  : undefined,
          });
          return;
        }

        if (command === 'put-user-locale-layer') {
          const res = await fetchDevStudio(
            buildDevStudioApiUrl('/api/devstudio/instance/localization/user', {
              accountId,
              publicId,
              locale,
            }),
            {
              method: 'PUT',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(body || {}),
            },
          );
          const payload = await res.json().catch(() => null);
          reply({
            ok: res.ok,
            status: res.status,
            payload,
            message:
              !res.ok && payload?.error?.reasonKey
                ? String(payload.error.reasonKey)
                : !res.ok
                  ? `HTTP_${res.status}`
                  : undefined,
          });
          return;
        }

        if (command === 'delete-user-locale-layer') {
          const res = await fetchDevStudio(
            buildDevStudioApiUrl('/api/devstudio/instance/localization/user', {
              accountId,
              publicId,
              locale,
            }),
            {
              method: 'DELETE',
            },
          );
          const payload = await res.json().catch(() => null);
          reply({
            ok: res.ok,
            status: res.status,
            payload,
            message:
              !res.ok && payload?.error?.reasonKey
                ? String(payload.error.reasonKey)
                : !res.ok
                  ? `HTTP_${res.status}`
                  : undefined,
          });
          return;
        }

        reply({
          ok: false,
          status: 422,
          message: 'coreui.errors.builder.command.unsupported',
        });
      } catch (error) {
        reply({
          ok: false,
          status: 500,
          message: error instanceof Error ? error.message : String(error),
        });
      }
    }

    function setL10nStatusDisplay({ state, tone, value, meta }) {
      if (!(l10nStatus instanceof HTMLElement)) return;
      l10nStatus.dataset.state = state || 'idle';
      l10nStatus.dataset.tone = tone || 'unavailable';
      const valueLabel = value || '-';
      const metaLabel = meta || '';
      if (l10nStatusValue instanceof HTMLElement) l10nStatusValue.textContent = valueLabel;
      if (l10nStatusMeta instanceof HTMLElement) {
        l10nStatusMeta.textContent = metaLabel;
      }
      const hoverDetails = [valueLabel, metaLabel].filter(Boolean).join(' · ');
      if (l10nStatusTooltip instanceof HTMLElement) {
        l10nStatusTooltip.textContent = hoverDetails || 'No status details available.';
      }
      if (hoverDetails && valueLabel !== '-') {
        l10nStatus.setAttribute('aria-label', `Translations status: ${hoverDetails}`);
      } else {
        l10nStatus.setAttribute('aria-label', 'Translations status');
      }
      l10nStatus.removeAttribute('title');
    }

    function summarizeL10nStatus(payload) {
      const locales = Array.isArray(payload?.locales) ? payload.locales : [];
      const localized = locales.filter((entry) => entry?.locale && entry.locale !== 'en');
      const countStatus = (predicate) => localized.filter(predicate).length;
      const succeeded = countStatus((entry) => entry?.status === 'succeeded');
      const dirty = countStatus((entry) => entry?.status === 'dirty');
      const queued = countStatus((entry) => entry?.status === 'queued');
      const running = countStatus((entry) => entry?.status === 'running');
      const retrying = countStatus(
        (entry) => entry?.status === 'failed' && Boolean(entry?.nextAttemptAt),
      );
      const failed = countStatus((entry) => entry?.status === 'failed' && !entry?.nextAttemptAt);
      const superseded = countStatus((entry) => entry?.status === 'superseded');

      let label = 'Live';
      let tone = 'ready';
      if (failed > 0) {
        label = 'Failed';
        tone = 'unavailable';
      } else if (running > 0) {
        label = 'Updating';
        tone = 'running';
      } else if (queued > 0) {
        label = 'Queued';
        tone = 'pending';
      } else if (retrying > 0) {
        label = 'Retrying';
        tone = 'retrying';
      } else if (dirty > 0 || superseded > 0) {
        label = 'Outdated';
        tone = 'pending';
      }

      const firstError = localized.find((entry) => entry?.lastError);
      const rawError = firstError?.lastError ? String(firstError.lastError).trim() : '';
      const meta = [
        succeeded > 0 ? `${succeeded} live` : '',
        running > 0 ? `${running} running` : '',
        queued > 0 ? `${queued} queued` : '',
        retrying > 0 ? `${retrying} retrying` : '',
        dirty > 0 ? `${dirty} dirty` : '',
        superseded > 0 ? `${superseded} superseded` : '',
        failed > 0 ? `${failed} failed` : '',
        rawError
          ? `Last error: ${rawError.length > 120 ? `${rawError.slice(0, 117)}...` : rawError}`
          : '',
      ]
        .filter(Boolean)
        .join(' · ');
      const shouldPoll = running > 0 || queued > 0 || retrying > 0;
      return { label, tone, meta, shouldPoll };
    }

    async function refreshL10nStatus(publicId) {
      if (SUPPORT_MODE) {
        setL10nStatusDisplay({
          state: 'ready',
          tone: 'unavailable',
          value: SUPPORT_STATUS_VALUE,
          meta: SUPPORT_STATUS_META,
        });
        return;
      }
      if (!publicId) {
        setL10nStatusDisplay({ state: 'hidden', tone: 'unavailable', value: '-', meta: '' });
        return;
      }

      if (isLocalDefaultPublicId(publicId)) {
        setL10nStatusDisplay({
          state: 'ready',
          tone: 'unavailable',
          value: 'Local',
          meta: 'Main instance from widget defaults; no cloud locale jobs',
        });
        return;
      }

      if (l10nStatusTimer) {
        clearTimeout(l10nStatusTimer);
        l10nStatusTimer = null;
      }

      setL10nStatusDisplay({ state: 'loading', tone: 'pending', value: 'Loading...', meta: '' });

      try {
        const res = await fetchDevStudio(
          buildDevStudioApiUrl(
            `/api/devstudio/instances/${encodeURIComponent(publicId)}/l10n/status`,
            {
              _t: Date.now(),
            },
          ),
        );
        const payload = await res.json().catch(() => null);

        if (!res.ok) {
          const reasonKey = payload?.error?.reasonKey || payload?.error?.code || null;
          if (res.status === 403 && String(reasonKey || '').includes('coreui.upsell')) {
            setL10nStatusDisplay({
              state: 'ready',
              tone: 'unavailable',
              value: 'Off',
              meta: 'Upgrade required',
            });
            return;
          }
          setL10nStatusDisplay({
            state: 'ready',
            tone: 'unavailable',
            value: 'Unavailable',
            meta: '',
          });
          return;
        }

        if (payload?.unavailable === true) {
          setL10nStatusDisplay({
            state: 'ready',
            tone: 'unavailable',
            value: 'Unavailable',
            meta: 'Translations status unavailable',
          });
          return;
        }

        const locales = Array.isArray(payload?.locales) ? payload.locales : [];
        const nonBaseLocales = locales.filter((entry) => entry?.locale !== 'en');
        if (!nonBaseLocales.length) {
          setL10nStatusDisplay({
            state: 'ready',
            tone: 'unavailable',
            value: 'Off',
            meta: 'No active locales (EN only)',
          });
          return;
        }

        const summary = summarizeL10nStatus(payload);
        setL10nStatusDisplay({
          state: 'ready',
          tone: summary.tone,
          value: summary.label,
          meta: summary.meta,
        });

        if (summary.shouldPoll) {
          l10nStatusTimer = setTimeout(() => {
            refreshL10nStatus(publicId).catch(() => {});
          }, 15000);
        }
      } catch (err) {
        console.error('[DevStudio] Failed to load l10n status', err);
        setL10nStatusDisplay({
          state: 'ready',
          tone: 'unavailable',
          value: 'Unavailable',
          meta: '',
        });
      }
    }

    let isPosting = false;
    window.addEventListener(
      'message',
      (event) => {
        if (event.origin !== BOB_ORIGIN) return;
        if (event.source !== iframe.contentWindow) return;
        const data = event.data;
        if (data && data.type === 'bob:request-instance-switch') {
          const publicId = typeof data.publicId === 'string' ? data.publicId.trim() : '';
          if (!publicId) return;
          if (!findInstanceByPublicId(publicId)) return;
          switchInstance(publicId);
          return;
        }
        if (data && data.type === 'bob:account-command') {
          const requestId = typeof data.requestId === 'string' ? data.requestId.trim() : '';
          const sessionId = typeof data.sessionId === 'string' ? data.sessionId.trim() : '';
          const command = typeof data.command === 'string' ? data.command.trim() : '';
          const accountId = typeof data.accountId === 'string' ? data.accountId.trim() : '';
          const publicId = typeof data.publicId === 'string' ? data.publicId.trim() : '';
          const locale = typeof data.locale === 'string' ? data.locale.trim() : '';
          if (!requestId || !sessionId || sessionId !== bobSessionId || !command || !accountId || !publicId) {
            return;
          }
          if (SUPPORT_MODE) {
            void runSupportAccountCommand({
              source: event.source,
              requestId,
              sessionId,
              command,
              accountId,
              publicId,
              body: data.body,
            });
            return;
          }
          void runDevstudioAccountCommand({
            source: event.source,
            requestId,
            sessionId,
            command,
            accountId,
            publicId,
            locale,
            body: data.body,
          });
          return;
        }
        if (data && data.type === 'bob:session-ready') {
          const sessionId = typeof data.sessionId === 'string' ? data.sessionId.trim() : '';
          if (!sessionId) {
            console.error('[DevStudio] bob:session-ready missing sessionId');
            return;
          }
          if (data.bootMode && data.bootMode !== 'message') {
            console.error('[DevStudio] Bob bootMode mismatch', data.bootMode);
            return;
          }
          bobSessionId = sessionId;
          if (!currentPublicId) return;
          console.log('[DevStudio] Received bob:session-ready, posting instance', currentPublicId);
          if (isPosting) return;
          isPosting = true;
          Promise.resolve(sendInstanceToIframe(currentPublicId))
            .catch((error) => console.error('[DevStudio] Failed to send instance to Bob', error))
            .finally(() => {
              isPosting = false;
            });
        }
        if (data && data.type === 'bob:published') {
          const publicId = typeof data.publicId === 'string' ? data.publicId : '';
          const widgetType = typeof data.widgetType === 'string' ? data.widgetType : '';
          const config = data.config && typeof data.config === 'object' ? data.config : null;
          if (!publicId || !widgetType || !config) return;
          refreshL10nStatus(publicId).catch(() => {});
        }
      },
      { signal: abortController.signal },
    );

      if (!header || !dropdown || !widgetSelector) {
        requestAnimationFrame(attachDropdown);

      header.classList.add('devstudio-instances-header');

    function normalizeWidgetname(raw) {
      if (!raw) return null;
      if (/^[a-z0-9_]+$/.test(raw)) return raw;
      const parts = String(raw)
        .split(/[^a-z0-9_]+/i)
        .filter(Boolean);
      if (!parts.length) return null;
      return parts[parts.length - 1].toLowerCase();
    }

    function formatWidgetLabel(widgetSlug) {
      const slug = normalizeWidgetname(widgetSlug);
      if (!slug) return 'Unknown';
      return slug
        .split(/[_-]+/g)
        .filter(Boolean)
        .map((part) => part.slice(0, 1).toUpperCase() + part.slice(1))
        .join(' ');
    }

    function buildLocalDefaultPublicId(widgetSlug) {
      const normalized = normalizeWidgetname(widgetSlug);
      if (!normalized) throw new Error('[DevStudio] Invalid widget type for widget defaults.');
      return `${LOCAL_DEFAULT_INSTANCE_PREFIX}${normalized}`;
    }

    function isLocalDefaultPublicId(publicId) {
      return typeof publicId === 'string' && publicId.startsWith(LOCAL_DEFAULT_INSTANCE_PREFIX);
    }

    function buildLocalDefaultInstance(widgetSlug) {
      const normalized = normalizeWidgetname(widgetSlug);
      if (!normalized) return null;
      return {
        publicId: buildLocalDefaultPublicId(normalized),
        widgetname: normalized,
        widgetSlug: normalized,
        label: 'Main instance',
        status: 'draft',
        source: 'local',
        actions: null,
        config: null,
        localization: null,
        policy: null,
        meta: null,
      };
    }

    function isMainInstancePublicId(publicId, widgetSlug) {
      const normalized = normalizeWidgetname(widgetSlug);
      if (!normalized || typeof publicId !== 'string') return false;
      return publicId.trim().toLowerCase() === `wgt_main_${normalized}`;
    }

    function formatInstanceLabel(instance) {
      if (!instance || typeof instance !== 'object') return DEFAULT_INSTANCE_DISPLAY_NAME;
      if (isMainInstancePublicId(instance.publicId, instance.widgetSlug || instance.widgetname)) {
        return 'Main instance';
      }
      const raw = typeof instance.label === 'string' ? instance.label.trim() : '';
      return raw || DEFAULT_INSTANCE_DISPLAY_NAME;
    }

    function findInstanceByPublicId(publicId) {
      if (!publicId) return null;
      const existing = instances.find((inst) => inst.publicId === publicId);
      if (existing) return existing;
      if (isLocalDefaultPublicId(publicId)) {
        const widgetSlug = publicId.slice(LOCAL_DEFAULT_INSTANCE_PREFIX.length);
        return buildLocalDefaultInstance(widgetSlug);
      }
      return null;
    }

    function listWidgetSlugs() {
      if (widgetTypes.length) return widgetTypes.slice();
      return Array.from(
        new Set(
          instances
            .map((inst) => inst.widgetSlug)
            .filter((slug) => typeof slug === 'string' && slug),
        ),
      ).sort((a, b) => a.localeCompare(b));
    }

    function getScopedInstances() {
      if (!selectedWidgetSlug) return instances;
      const scoped = instances.filter((inst) => inst.widgetSlug === selectedWidgetSlug);
      if (scoped.length) return scoped;
      if (PROFILE === 'source') {
        const localDefault = buildLocalDefaultInstance(selectedWidgetSlug);
        return localDefault ? [localDefault] : [];
      }
      return [];
    }

    function syncWidgetSelector() {
      if (!(widgetSelect instanceof HTMLSelectElement)) return;
      const widgetSlugs = listWidgetSlugs();
      widgetSelect.replaceChildren();
      widgetSlugs.forEach((widgetSlug) => {
        const option = document.createElement('option');
        option.value = widgetSlug;
        option.textContent = formatWidgetLabel(widgetSlug);
        widgetSelect.appendChild(option);
      });
      if (!widgetSlugs.length) {
        selectedWidgetSlug = null;
        if (widgetSelector instanceof HTMLElement) widgetSelector.style.display = 'none';
        return;
      }
      if (!selectedWidgetSlug || !widgetSlugs.includes(selectedWidgetSlug)) {
        selectedWidgetSlug = widgetSlugs[0];
      }
      widgetSelect.value = selectedWidgetSlug;
      if (widgetSelector instanceof HTMLElement) {
        widgetSelector.style.display = widgetSlugs.length > 1 ? 'block' : 'none';
      }
    }

    function syncSelectedWidgetForPublicId(publicId) {
      const selected = findInstanceByPublicId(publicId);
      const widgetSlug = selected?.widgetSlug || normalizeWidgetname(selected?.widgetname);
      if (!widgetSlug) return;
      if (widgetSlug === selectedWidgetSlug) return;
      selectedWidgetSlug = widgetSlug;
      syncWidgetSelector();
    }

    async function ensureCompiledWidget(widgetname) {
      const slug = normalizeWidgetname(widgetname);
      if (!slug) throw new Error(`Cannot normalize widget name: ${widgetname}`);
      if (compiledCache.has(slug)) return compiledCache.get(slug);
      if (compiledPromiseCache.has(slug)) return compiledPromiseCache.get(slug);

      const promise = (async () => {
        const res = await fetchBob(`${BOB_ORIGIN}/api/widgets/${slug}/compiled`, {
          cache: 'no-store',
        });
        if (!res.ok) {
          let details = '';
          try {
            const text = await res.text();
            if (text) {
              try {
                const parsed = JSON.parse(text);
                if (parsed && typeof parsed === 'object' && 'error' in parsed) {
                  details = String(parsed.error || '');
                } else {
                  details = text;
                }
              } catch {
                details = text;
              }
            }
          } catch {}
          const suffix = details ? ` → ${details}` : '';
          throw new Error(`Failed to compile widget ${widgetname} (${res.status})${suffix}`);
        }
        const json = await res.json();
        compiledCache.set(slug, json);
        return json;
      })().finally(() => {
        compiledPromiseCache.delete(slug);
      });

      compiledPromiseCache.set(slug, promise);
      return promise;
    }

    async function fetchInstanceCore(publicId, accountId = null) {
      if (!accountId) {
        accountId = await resolveDevStudioAccountId();
      }
      const res = await fetchDevStudio(
        buildDevStudioApiUrl('/api/devstudio/instance', {
          accountId,
          publicId,
          _t: Date.now(),
        }),
      );
      if (!res.ok) throw new Error(`Failed to load instance ${publicId} (${res.status})`);
      return await res.json();
    }

    async function fetchInstanceLocalization(publicId, accountId = null) {
      if (!accountId) {
        accountId = await resolveDevStudioAccountId();
      }
      const res = await fetchDevStudio(
        buildDevStudioApiUrl('/api/devstudio/instance/localization', {
          accountId,
          publicId,
          _t: Date.now(),
        }),
      );
      if (!res.ok) {
        throw new Error(`Failed to load localization ${publicId} (${res.status})`);
      }
      return await res.json();
    }

    async function fetchInstanceEnvelope(publicId, accountId = null) {
      if (!accountId) {
        accountId = await resolveDevStudioAccountId();
      }
      const cacheKey = `${accountId}::${publicId}`;
      if (instanceEnvelopePromiseCache.has(cacheKey)) {
        return instanceEnvelopePromiseCache.get(cacheKey);
      }
      const promise = (async () => {
        const [core, localizationResult] = await Promise.all([
          fetchInstanceCore(publicId, accountId),
          fetchInstanceLocalization(publicId, accountId).catch(() => null),
        ]);
        return {
          ...core,
          localization: localizationResult?.localization ?? core?.localization ?? null,
        };
      })().finally(() => {
        instanceEnvelopePromiseCache.delete(cacheKey);
      });

      instanceEnvelopePromiseCache.set(cacheKey, promise);
      return promise;
    }

    async function fetchLocalWidgetCatalog() {
      const res = await fetch(`/api/devstudio/widgets?_t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(
          `[DevStudio] Failed to load local widget catalog (HTTP ${res.status})${text ? `: ${text}` : ''}`,
        );
      }
      const data = await res.json().catch(() => null);
      widgetTypes = Array.isArray(data?.widgets)
        ? data.widgets
            .map((entry) => normalizeWidgetname(entry?.widgetType))
            .filter((widgetType) => typeof widgetType === 'string' && widgetType)
        : [];
      return widgetTypes.slice();
    }

    function rebuildInstances() {
      instances = storedInstances.slice();
    }

    function rebuildWidgetTypesFromInstances(localWidgetTypes) {
      const instanceWidgetTypes = storedInstances
        .map((instance) => normalizeWidgetname(instance.widgetSlug || instance.widgetname))
        .filter((widgetSlug) => typeof widgetSlug === 'string' && widgetSlug);
      widgetTypes = Array.from(new Set([...(localWidgetTypes || []), ...instanceWidgetTypes])).sort(
        (a, b) => a.localeCompare(b),
      );
    }

    async function fetchInstances() {
      console.log('[DevStudio] Fetching instances');
      const res = await fetchDevStudio(buildDevStudioApiUrl('/api/devstudio/instances', { _t: Date.now() }));
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        let detail = text;
        try {
          const parsed = JSON.parse(text);
          if (parsed && typeof parsed === 'object' && parsed.error) {
            detail = parsed.error?.reasonKey
              ? String(parsed.error.reasonKey)
              : JSON.stringify(parsed.error);
          }
        } catch {}
        throw new Error(
          `[DevStudio] Failed to fetch instances (HTTP ${res.status})${detail ? `: ${detail}` : ''}`,
        );
      }
      const data = await res.json();
      const payload = Array.isArray(data.instances) ? data.instances : [];
      storedInstances = payload.map((inst) => ({
        publicId: inst.publicId,
        widgetname: inst.widgetType,
        widgetSlug: normalizeWidgetname(inst.widgetType),
        label: isMainInstancePublicId(inst.publicId, inst.widgetType)
          ? 'Main instance'
          : typeof inst.displayName === 'string' && inst.displayName.trim()
            ? inst.displayName.trim()
            : DEFAULT_INSTANCE_DISPLAY_NAME,
        status: inst.status === 'published' ? 'published' : 'unpublished',
        source: inst.source === 'curated' ? 'curated' : 'account',
        actions: inst.actions || null,
        config: null,
        localization: null,
        policy: null,
        meta: null,
      }));
      return storedInstances.slice();
    }

    async function loadInstances() {
      if (SUPPORT_MODE) {
        const supportInstance = buildSupportInstance(supportTarget);
        if (!supportInstance) {
          selectedWidgetSlug = null;
          currentPublicId = null;
          currentLabel.textContent = 'Support target unavailable';
          valueField.value = '';
          menu.innerHTML =
            '<div class="devstudio-instances__empty-option body-s">Open a customer target from Customer Recovery first.</div>';
          dropdown.style.display = 'none';
          if (widgetSelector instanceof HTMLElement) widgetSelector.style.display = 'none';
          setL10nStatusDisplay({
            state: 'ready',
            tone: 'unavailable',
            value: 'Unavailable',
            meta: 'Support target missing',
          });
          return;
        }

        storedInstances = [supportInstance];
        instances = storedInstances.slice();
        widgetTypes = [supportInstance.widgetSlug];
        selectedWidgetSlug = supportInstance.widgetSlug;
        currentPublicId = supportInstance.publicId;
        dropdown.style.display = 'inline-block';
        syncWidgetSelector();
        updateCurrentLabel();
        renderInstances();
        await refreshL10nStatus(currentPublicId);
        if (bobSessionId && currentPublicId) {
          await sendInstanceToIframe(currentPublicId);
        }
        return;
      }

      const localWidgetTypes = await fetchLocalWidgetCatalog();
      await fetchInstances();
      rebuildInstances();
      rebuildWidgetTypesFromInstances(localWidgetTypes);

      if (widgetTypes.length === 0) {
        selectedWidgetSlug = null;
        currentPublicId = null;
        currentLabel.textContent = 'No widgets found';
        valueField.value = '';
        menu.innerHTML = '';
        dropdown.style.display = 'none';
        if (widgetSelector instanceof HTMLElement) widgetSelector.style.display = 'none';
        return;
      }
      dropdown.style.display = 'inline-block';

      if (!selectedWidgetSlug || !widgetTypes.includes(selectedWidgetSlug)) {
        selectedWidgetSlug = widgetTypes[0];
      }
      syncWidgetSelector();

      const scopedInstances = getScopedInstances();
      if (!scopedInstances.some((inst) => inst.publicId === currentPublicId)) {
        currentPublicId = scopedInstances[0]?.publicId || instances[0]?.publicId || null;
      }
      syncSelectedWidgetForPublicId(currentPublicId);

      console.log('[DevStudio] Current publicId', currentPublicId, 'instances', instances.length);
      updateCurrentLabel();
      renderInstances();
      if (bobSessionId && currentPublicId) {
        sendInstanceToIframe(currentPublicId).catch((error) => {
          console.error('[DevStudio] Failed to load initial instance into Bob', error);
          currentLabel.textContent = 'Error loading instances';
        });
      }
      refreshL10nStatus(currentPublicId).catch(() => {});
    }

    function updateCurrentLabel() {
      if (!currentPublicId) {
        currentLabel.textContent = 'No instances yet';
        valueField.value = '';
        return;
      }

    function renderInstances() {
      const scopedInstances = getScopedInstances();
      if (!scopedInstances.length) {
        menu.innerHTML = '<div class="devstudio-instances__empty-option body-s">No instances</div>';
        return;
      }

      menu.innerHTML = scopedInstances
        .map((inst) => {

        >

            <svg viewBox="0 0 16 16" fill="none">
              <path d="M4 8l3 3 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>

      menu.querySelectorAll('[data-public-id]').forEach((button) => {

    function switchInstance(publicId) {
      syncSelectedWidgetForPublicId(publicId);
      currentPublicId = publicId;
      isOpen = false;
      dropdown.setAttribute('data-state', 'closed');
      control.setAttribute('aria-expanded', 'false');
      updateCurrentLabel();
      renderInstances();
      if (bobSessionId) {
        sendInstanceToIframe(publicId).catch((error) => {
          console.error('[DevStudio] Failed to send instance to Bob', error);
          currentLabel.textContent = 'Error loading instances';

      }
      refreshL10nStatus(publicId).catch(() => {});

    async function exportInstanceDataFromBob({ timeoutMs = 2500, exportMode = 'base' } = {}) {
      const target = iframe.contentWindow;
      if (!target) throw new Error('[DevStudio] Bob iframe not ready');
      const requestId = crypto.randomUUID();

      return await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('[DevStudio] Timed out requesting instance data from Bob'));
        }, timeoutMs);

        const cleanup = () => {
          clearTimeout(timeout);
          window.removeEventListener('message', onMessage);
        };

        const onMessage = (event) => {
          if (event.origin !== BOB_ORIGIN) return;
          const data = event.data;
          if (!data || typeof data !== 'object') return;
          if (data.type !== 'bob:export-instance-data') return;
          if (data.requestId !== requestId) return;
          cleanup();
          if (data.ok !== true) {
            reject(new Error(data.error || '[DevStudio] Bob failed to export instance data'));
            return;
          }
          resolve(data);
        };

        window.addEventListener('message', onMessage);
        target.postMessage(
          {
            type: 'devstudio:export-instance-data',
            requestId,
            exportMode,
          },
          BOB_ORIGIN,
        );
      });
    }

    function cloneJson(value) {
      // v1: config is JSON-only.
      return JSON.parse(JSON.stringify(value ?? null));
    }

    function stripTokyoBaseFromConfig(config, tokyoBase) {
      if (!config || typeof config !== 'object') return config;
      const base = String(tokyoBase || '')
        .trim()
        .replace(/\/+$/, '');
      if (!base) return config;
      const escaped = base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const baseRegex = new RegExp(escaped, 'g');

      const visit = (node) => {
        if (typeof node === 'string') {
          if (!node.includes(base)) return;
          return node.replace(baseRegex, '');
        }
        if (!node || typeof node !== 'object') return;
        if (Array.isArray(node)) {
          for (let i = 0; i < node.length; i += 1) {
            const replaced = visit(node[i]);
            if (typeof replaced === 'string') node[i] = replaced;
          }
          return;
        }
        for (const [key, value] of Object.entries(node)) {
          const replaced = visit(value);
          if (typeof replaced === 'string') node[key] = replaced;
        }
      };

      visit(config);
      return config;
    }

    function readConfigValueAtPath(config, path) {
      if (!config || typeof config !== 'object' || Array.isArray(config)) return undefined;
      const segments = String(path || '')
        .split('.')
        .filter(Boolean);
      if (!segments.length) return undefined;
      let current = config;
      for (const segment of segments) {
        if (!current || typeof current !== 'object' || Array.isArray(current)) return undefined;
        if (!Object.prototype.hasOwnProperty.call(current, segment)) return undefined;
        current = current[segment];
      }
      return current;
    }

    function buildThemeValuesFromConfig(config, compiled) {
      const values = {};
      const controls = Array.isArray(compiled?.controls) ? compiled.controls : [];
      const allowedPrefixes = ['stage.', 'pod.', 'appearance.', 'typography.'];
      const tokenPathPattern = /(^|\.)__[^.]+__(\.|$)/;

      controls.forEach((control) => {
        if (!control || typeof control !== 'object') return;
        const path = typeof control.path === 'string' ? control.path.trim() : '';
        if (!path) return;
        if (path === 'appearance.theme') return;
        if (!allowedPrefixes.some((prefix) => path.startsWith(prefix))) return;
        if (tokenPathPattern.test(path)) return;
        if (Object.prototype.hasOwnProperty.call(values, path)) return;
        const value = readConfigValueAtPath(config, path);
        if (value === undefined) return;
        values[path] = cloneJson(value);
      });

      return values;
    }

    function normalizeColorFillValue(raw) {
      if (raw && typeof raw === 'object' && !Array.isArray(raw)) {
        return cloneJson(raw);
      }
      if (typeof raw !== 'string') return raw;
      const color = raw.trim();
      if (!color) return raw;
      if (color.startsWith('{')) {
        try {
          const parsed = JSON.parse(color);
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            return cloneJson(parsed);
          }
        } catch {}
      }
      return { type: 'color', color };
    }

    function normalizeThemeValuesForCompiledControls(values, compiled) {
      const normalized = cloneJson(values);
      const controls = Array.isArray(compiled?.controls) ? compiled.controls : [];
      controls.forEach((control) => {
        if (!control || typeof control !== 'object') return;
        if (control.type !== 'dropdown-fill') return;
        const path = typeof control.path === 'string' ? control.path : '';
        if (!path || !Object.prototype.hasOwnProperty.call(normalized, path)) return;
        normalized[path] = normalizeColorFillValue(normalized[path]);
      });
      return normalized;
    }

    async function listTokyoThemes() {
      const res = await fetch(`/api/themes/list?_t=${Date.now()}`, { cache: 'no-store' });
      const text = await res.text().catch(() => '');
      if (!res.ok) {
        throw new Error(
          `[DevStudio] List themes failed (HTTP ${res.status})${text ? `: ${text}` : ''}`,
        );
      }
      const json = text ? JSON.parse(text) : null;
      const themes = Array.isArray(json?.themes) ? json.themes : [];
      return themes
        .map((theme) => ({
          id: String(theme?.id || '')
            .trim()
            .toLowerCase(),
          label: String(theme?.label || '').trim(),
        }))
        .filter((theme) => Boolean(theme.id) && theme.id !== 'custom');
    }

    function openThemeModal({ themes, defaultThemeId }) {
      if (!themeModal || !(themeModalSelect instanceof HTMLSelectElement)) {
        return Promise.resolve(null);
      }

      const normalizedThemes = Array.isArray(themes) ? themes : [];
      if (!normalizedThemes.length) return Promise.resolve(null);

      themeModalSelect.replaceChildren();
      const hasDefaultTheme =
        Boolean(defaultThemeId) && normalizedThemes.some((theme) => theme.id === defaultThemeId);
      if (!hasDefaultTheme) {
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = 'Select theme to overwrite...';
        placeholder.disabled = true;
        placeholder.selected = true;
        placeholder.hidden = true;
        themeModalSelect.appendChild(placeholder);
      }
      normalizedThemes.forEach((theme) => {
        const opt = document.createElement('option');
        opt.value = theme.id;
        opt.textContent = theme.label ? `${theme.label} (${theme.id})` : theme.id;
        themeModalSelect.appendChild(opt);
      });

      const initial = hasDefaultTheme ? defaultThemeId : '';
      themeModalSelect.value = initial;

      themeModal.hidden = false;
      themeModalSelect.focus();

      return new Promise((resolve) => {
        themeModalState = { resolve };
      });
    }

    function closeThemeModal(result) {
      if (themeModal) themeModal.hidden = true;
      if (themeModalState && typeof themeModalState.resolve === 'function') {
        themeModalState.resolve(result ?? null);
      }
      themeModalState = null;
    }

    async function updateTokyoTheme({ themeId, values }) {
      const res = await fetch(`/api/themes/update?_t=${Date.now()}`, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ themeId, values }),
      });
      const text = await res.text().catch(() => '');
      if (!res.ok) {
        throw new Error(
          `[DevStudio] Update theme failed (HTTP ${res.status})${text ? `: ${text}` : ''}`,
        );
      }
      return text ? JSON.parse(text) : null;
    }

    async function updateThemeFromEditor() {
      if (!IS_SOURCE_PROFILE) {
        throw new Error(
          '[DevStudio] Update Theme is source-profile only. Re-open DevStudio with ?profile=source.',
        );
      }
      if (!currentPublicId) {
        throw new Error('[DevStudio] Select an instance first.');
      }
      const current = findInstanceByPublicId(currentPublicId);
      const widgetSlug = current?.widgetSlug || normalizeWidgetname(current?.widgetname);
      if (!widgetSlug) {
        throw new Error('[DevStudio] Unable to resolve widget type from the selected instance.');
      }

      const localHostRegex = /^https?:\/\/(?:localhost|127\.0\.0\.1)(?::\d+)?$/i;
      if (!localHostRegex.test(BOB_ORIGIN)) {
        throw new Error(
          '[DevStudio] Update Theme requires local Bob (http://localhost:3000). Remote Bob does not reflect local Tokyo theme edits.',
        );
      }

      const exported = await exportInstanceDataFromBob({
        exportMode: 'current',
      });
      const config = exported?.instanceData;
      if (!config || typeof config !== 'object') {
        throw new Error('[DevStudio] Bob export did not include instanceData');
      }

      const editorThemeId = String(config?.appearance?.theme || '')
        .trim()
        .toLowerCase();
      const themes = await listTokyoThemes();
      const lastThemeId = String(sessionStorage.getItem(THEME_UPDATE_LAST_ID_STORAGE) || '')
        .trim()
        .toLowerCase();
      const hasEditorTheme =
        Boolean(editorThemeId) &&
        editorThemeId !== 'custom' &&
        themes.some((theme) => theme.id === editorThemeId);
      const hasLastTheme =
        Boolean(lastThemeId) &&
        lastThemeId !== 'custom' &&
        themes.some((theme) => theme.id === lastThemeId);
      const defaultThemeId = hasEditorTheme ? editorThemeId : hasLastTheme ? lastThemeId : '';
      if (!themes?.length) throw new Error('[DevStudio] Theme list not found.');
      const themeId = await openThemeModal({ themes, defaultThemeId });
      if (!themeId) throw new Error('[DevStudio] Canceled');
      const compiled = await ensureCompiledWidget(widgetSlug);
      const values = buildThemeValuesFromConfig(config, compiled);
      if (!Object.keys(values).length) {
        throw new Error('[DevStudio] Theme values not found in current config.');
      }

      const normalizedValues = normalizeThemeValuesForCompiledControls(values, compiled);
      const cleanedValues = stripTokyoBaseFromConfig(cloneJson(normalizedValues), TOKYO_BASE);
      await updateTokyoTheme({ themeId, values: cleanedValues });
      sessionStorage.setItem(THEME_UPDATE_LAST_ID_STORAGE, themeId);
      compiledCache.delete(widgetSlug);
      if (currentPublicId) {
        await sendInstanceToIframe(currentPublicId);
      }
      alert(`[DevStudio] Theme "${themeId}" updated from current editor state.`);
      return { themeId, values: cleanedValues };
    }

    if (platformActions instanceof HTMLElement) {
      const showThemeAction = isLocalDevStudio && IS_SOURCE_PROFILE;
      platformActions.style.display = showThemeAction ? 'inline-flex' : 'none';
    }

    platformUpdateTheme?.addEventListener('click', async () => {
      try {
        await updateThemeFromEditor();
      } catch (err) {
        alert(err instanceof Error ? err.message : String(err));
      }
    });

    themeModalConfirm?.addEventListener('click', () => {
      try {
        if (!(themeModalSelect instanceof HTMLSelectElement))
          throw new Error('[DevStudio] Theme selector missing');
        const themeId = String(themeModalSelect.value || '')
          .trim()
          .toLowerCase();
        if (!themeId) throw new Error('[DevStudio] Select a theme first.');
        closeThemeModal(themeId);
      } catch (err) {
        alert(err instanceof Error ? err.message : String(err));
      }
    });

    themeModalClose?.addEventListener('click', () => {
      closeThemeModal(null);
    });

    themeModalCancel?.addEventListener('click', () => {
      closeThemeModal(null);
    });

    themeModal?.addEventListener('click', (event) => {
      if (event.target === themeModal) closeThemeModal(null);
    });

    document.addEventListener(
      'keydown',
      (event) => {
        if (event.key !== 'Escape') return;
        if (themeModal && !themeModal.hidden) closeThemeModal(null);
      },
      { signal: abortController.signal },
    );

    async function sendInstanceToIframe(publicId) {
      if (!publicId) {
        throw new Error('[DevStudio] Missing publicId for sendInstanceToIframe');
      }
      const requestSeq = ++sendInstanceSeq;
      const totalStart = performance.now();

      const target = iframe.contentWindow;
      if (!target) {
        throw new Error('[DevStudio] Bob iframe contentWindow unavailable');
      }

      const instance = findInstanceByPublicId(publicId);
      if (!instance) {
        throw new Error(`[DevStudio] Instance not found for publicId ${publicId}`);
      }
      const label =
        typeof instance.label === 'string' && instance.label.trim()
          ? instance.label.trim()
          : DEFAULT_INSTANCE_DISPLAY_NAME;

      const slug = instance.widgetSlug || normalizeWidgetname(instance.widgetname);
      if (!slug) {
        throw new Error(`[DevStudio] Unable to derive widget slug for ${instance.widgetname}`);
      }

      if (instance.source === 'local' || isLocalDefaultPublicId(publicId)) {
        const compiledStart = performance.now();
        const compiled = await ensureCompiledWidget(instance.widgetname);
        if (requestSeq !== sendInstanceSeq) return;
        const defaults =
          compiled?.defaults &&
          typeof compiled.defaults === 'object' &&
          !Array.isArray(compiled.defaults)
            ? cloneJson(compiled.defaults)
            : {};

        await postOpenEditorAndWait(target, {
          type: 'ck:open-editor',
          subjectMode: 'account',
          publicId,
          label,
          widgetname: slug,
          compiled,
          instanceData: defaults,
        });
        console.log('[DevStudio] Main instance load timings', {
          publicId,
          compileMs: Math.round(performance.now() - compiledStart),
          totalMs: Math.round(performance.now() - totalStart),
        });
        return;
      }

      if (SUPPORT_MODE) {
        if (!supportTarget) {
          throw new Error('[DevStudio] Missing support target envelope');
        }
        const compiled = await ensureCompiledWidget(instance.widgetname);
        if (requestSeq !== sendInstanceSeq) return;
        await postOpenEditorAndWait(target, {
          type: 'ck:open-editor',
          subjectMode: 'account',
          publicId,
          accountId:
            typeof supportTarget.accountId === 'string' && supportTarget.accountId.trim()
              ? supportTarget.accountId.trim()
              : '',
          ownerAccountId:
            typeof supportTarget.ownerAccountId === 'string' && supportTarget.ownerAccountId.trim()
              ? supportTarget.ownerAccountId.trim()
              : typeof supportTarget.accountId === 'string' && supportTarget.accountId.trim()
                ? supportTarget.accountId.trim()
                : '',
          label,
          widgetname: slug,
          compiled,
          instanceData:
            supportTarget.config && typeof supportTarget.config === 'object' && !Array.isArray(supportTarget.config)
              ? supportTarget.config
              : {},
          status: supportTarget.status === 'published' ? 'published' : 'unpublished',
          localization:
            supportTarget.localization && typeof supportTarget.localization === 'object'
              ? supportTarget.localization
              : null,
          policy:
            supportTarget.policy && typeof supportTarget.policy === 'object' ? supportTarget.policy : null,
        });
        return;
      }

      let compiled = compiledCache.get(slug);
      const devstudioAccountId = await resolveDevStudioAccountId();
      const hasInlineConfig = Boolean(
        instance.config && typeof instance.config === 'object' && !Array.isArray(instance.config),
      );
      const compiledStart = performance.now();
      const compiledPromise = compiled
        ? Promise.resolve({ value: compiled, durationMs: performance.now() - compiledStart })
        : ensureCompiledWidget(instance.widgetname).then((nextCompiled) => ({
            value: nextCompiled,
            durationMs: performance.now() - compiledStart,
          }));

      const envelopeStart = performance.now();
      const envelopePromise = hasInlineConfig
        ? Promise.resolve({
            value: {
              config: instance.config,
              localization: instance.localization ?? null,
              policy: instance.policy ?? null,
              ownerAccountId: devstudioAccountId,
              status: instance.status ?? 'unpublished',
            },
            durationMs: performance.now() - envelopeStart,
          })
        : fetchInstanceEnvelope(publicId, devstudioAccountId).then((envelope) => ({
            value: envelope,
            durationMs: performance.now() - envelopeStart,
          }));

      const [compiledResult, envelopeResult] = await Promise.all([
        compiledPromise,
        envelopePromise,
      ]);
      if (requestSeq !== sendInstanceSeq) return;
      compiled = compiledResult.value;
      const envelope = envelopeResult.value ?? {};
      const config = envelope?.config ?? null;
      instance.config = config;
      instance.localization = envelope?.localization ?? null;
      instance.policy = envelope?.policy ?? null;
      instance.status = envelope?.status === 'published' ? 'published' : 'unpublished';
      console.log('[DevStudio] Posting instance to Bob', { publicId, widgetname: slug });
      await postOpenEditorAndWait(target, {
        type: 'ck:open-editor',
        subjectMode: 'account',
        publicId,
        accountId: devstudioAccountId,
        ownerAccountId:
          typeof envelope?.ownerAccountId === 'string' && envelope.ownerAccountId.trim()
            ? envelope.ownerAccountId.trim()
            : devstudioAccountId,
        label,
        widgetname: slug,
        compiled,
        instanceData: config ?? null,
        status: instance.status,
        localization: instance.localization,
        policy: instance.policy,
      });
      console.log('[DevStudio] Instance load timings', {
        publicId,
        compileMs: Math.round(compiledResult.durationMs),
        configMs: Math.round(envelopeResult.durationMs),
        totalMs: Math.round(performance.now() - totalStart),
      });
    }

    async function postOpenEditorAndWait(target, messageBase) {
      const sessionId = String(bobSessionId || '').trim();
      if (!sessionId) {
        throw new Error('[DevStudio] Bob session is not ready');
      }
      const requestId = crypto.randomUUID();
      const message = { ...messageBase, requestId, sessionId };

      await new Promise((resolve, reject) => {
        let settled = false;
        let acknowledged = false;
        let attempts = 0;
        let retryTimer = null;
        let timeoutTimer = null;

        const cleanup = () => {
          if (retryTimer) clearTimeout(retryTimer);
          if (timeoutTimer) clearTimeout(timeoutTimer);
          window.removeEventListener('message', onMessage);
        };

        const fail = (error) => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(error);
        };

        const succeed = () => {
          if (settled) return;
          settled = true;
          cleanup();
          resolve();
        };

        const send = () => {
          if (settled) return;
          attempts += 1;
          target.postMessage(message, BOB_ORIGIN);

          if (!acknowledged) {
            if (attempts >= 6) {
              fail(new Error('[DevStudio] Timed out waiting for bob:open-editor-ack'));
              return;
            }
            retryTimer = setTimeout(send, 250);
          }
        };

        const onMessage = (event) => {
          if (event.origin !== BOB_ORIGIN) return;
          if (event.source !== iframe.contentWindow) return;
          const data = event.data;
          if (!data || typeof data !== 'object') return;
          if (String(data.requestId || '') !== requestId) return;
          if (String(data.sessionId || '') !== sessionId) return;

          if (data.type === 'bob:open-editor-ack') {
            acknowledged = true;
            if (retryTimer) {
              clearTimeout(retryTimer);
              retryTimer = null;
            }
            return;
          }

          if (data.type === 'bob:open-editor-applied') {
            succeed();
            return;
          }

          if (data.type === 'bob:open-editor-failed') {
            const reason = String(
              data.reasonKey || data.message || '[DevStudio] Bob failed to apply instance',
            );
            fail(new Error(reason));
          }
        };

        timeoutTimer = setTimeout(
          () => fail(new Error('[DevStudio] Timed out waiting for bob:open-editor-applied')),
          7000,
        );
        window.addEventListener('message', onMessage);
        send();
      });
    }

    function setOpen(nextState) {
      isOpen = nextState;
      dropdown.setAttribute('data-state', isOpen ? 'open' : 'closed');
      control.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }

    if (widgetSelect instanceof HTMLSelectElement) {
      widgetSelect.addEventListener(
        'change',
        () => {
          const nextWidgetSlug = normalizeWidgetname(widgetSelect.value);
          if (!nextWidgetSlug) return;
          if (nextWidgetSlug === selectedWidgetSlug) return;
          selectedWidgetSlug = nextWidgetSlug;

          const scopedInstances = getScopedInstances();
          const nextPublicId = scopedInstances.some((inst) => inst.publicId === currentPublicId)
            ? currentPublicId
            : scopedInstances[0]?.publicId || null;
          const instanceChanged = nextPublicId !== currentPublicId;
          currentPublicId = nextPublicId;

          setOpen(false);
          updateCurrentLabel();
          renderInstances();

          if (currentPublicId && instanceChanged && bobSessionId) {
            sendInstanceToIframe(currentPublicId).catch((error) => {
              console.error('[DevStudio] Failed to send instance to Bob', error);
            });
          }
          refreshL10nStatus(currentPublicId).catch(() => {});
        },
        { signal: abortController.signal },
      );
    }

    control.addEventListener(
      'click',
      () => {
        setOpen(!isOpen);
      },
      { signal: abortController.signal },
    );

    control.addEventListener(
      'keydown',
      (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          setOpen(!isOpen);
        } else if (event.key === 'ArrowDown') {
          event.preventDefault();
          setOpen(true);
          const firstOption = menu.querySelector('[data-public-id]');
          firstOption?.focus();
        } else if (event.key === 'Escape') {
          setOpen(false);
        }
      },
      { signal: abortController.signal },
    );

    menu.addEventListener(
      'keydown',
      (event) => {
        if (event.key === 'Escape') {
          setOpen(false);
          control.focus();
        } else if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
          const options = Array.from(menu.querySelectorAll('[data-public-id]'));
          const currentIndex = options.indexOf(document.activeElement);
          const nextIndex = event.key === 'ArrowUp' ? currentIndex - 1 : currentIndex + 1;
          const next = options[nextIndex];
          if (next) {
            event.preventDefault();
            next.focus();
          }
        } else if (event.key === 'Home') {
          const first = menu.querySelector('[data-public-id]');
          if (first) {
            event.preventDefault();
            first.focus();
          }
        } else if (event.key === 'End') {
          const options = menu.querySelectorAll('[data-public-id]');
          const last = options[options.length - 1];
          if (last) {
            event.preventDefault();
            last.focus();
          }
        } else if (event.key === 'Tab') {
          setOpen(false);
        } else if (event.key === 'Enter' || event.key === ' ') {
          const target = event.target.closest('[data-public-id]');
          if (target) {
            event.preventDefault();
            target.click();
          }
        }
      },
      { signal: abortController.signal },
    );

    document.addEventListener(
      'click',
      (event) => {
        if (!dropdown.contains(event.target)) {
          setOpen(false);
        }
      },
      { signal: abortController.signal },
    );

    (async () => {
      try {
        await loadInstances();
      } catch (error) {
        console.error('[DevStudio] Failed to load instances', error);
        currentLabel.textContent = 'Error loading instances';
      }
    })();
  </script>
</div>
