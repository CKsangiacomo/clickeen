<style>
  .account-operator {
    display: grid;
    gap: var(--space-4);
  }

  .account-operator__grid {
    display: grid;
    gap: var(--space-4);
    grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.9fr);
  }

  .account-operator__section {
    display: grid;
    gap: var(--space-3);
    padding: var(--space-4);
    border: 1px solid color-mix(in oklab, var(--role-border), transparent 8%);
    border-radius: var(--control-radius-xl);
    background: color-mix(in oklab, var(--role-surface-bg, var(--color-system-white)), white 28%);
    box-shadow: var(--shadow-floating);
  }

  .account-operator__section h2,
  .account-operator__section h3,
  .account-operator__section p {
    margin: 0;
  }

  .account-operator__summary {
    display: grid;
    gap: var(--space-3);
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  }

  .account-operator__summary-card {
    display: grid;
    gap: 6px;
    padding: var(--space-3);
    border-radius: var(--control-radius-lg);
    background: color-mix(in oklab, var(--color-system-gray-4), white 82%);
    border: 1px solid color-mix(in oklab, var(--role-border), transparent 18%);
  }

  .account-operator__label {
    color: color-mix(in oklab, var(--color-text), transparent 42%);
    font: 500 var(--fs-11) / var(--lh-tight) var(--font-ui);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .account-operator__value {
    color: var(--color-text);
    font: 600 var(--fs-16) / var(--lh-tight) var(--font-display, var(--font-ui));
    letter-spacing: -0.02em;
  }

  .account-operator__subvalue {
    color: color-mix(in oklab, var(--color-text), transparent 25%);
    font: 500 var(--fs-12) / 1.45 var(--font-ui);
  }

  .account-operator__toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    align-items: center;
  }

  .account-operator__input {
    flex: 1 1 240px;
    min-block-size: var(--control-size-lg);
    padding: 0 14px;
    border-radius: var(--control-radius-lg);
    border: 1px solid color-mix(in oklab, var(--role-border), transparent 8%);
    background: var(--color-system-white);
    color: var(--color-text);
    box-shadow: var(--shadow-floating);
    font: 500 var(--fs-13) / var(--lh-tight) var(--font-ui);
  }

  .account-operator__input:focus-visible,
  .account-operator__action:focus-visible {
    outline: 2px solid var(--color-system-blue);
    outline-offset: 2px;
  }

  .account-operator__action {
    min-block-size: var(--control-size-lg);
    padding: 0 14px;
    border-radius: var(--control-radius-lg);
    border: 0;
    background: color-mix(in oklab, var(--color-system-green-4), white 10%);
    color: var(--color-system-black);
    box-shadow: var(--shadow-floating);
    font: 600 var(--fs-12) / var(--lh-tight) var(--font-ui);
    cursor: pointer;
  }

  .account-operator__action[data-tone='neutral'] {
    background: color-mix(in oklab, var(--color-system-gray-4), white 60%);
  }

  .account-operator__action[data-tone='blue'] {
    background: color-mix(in oklab, var(--color-system-blue), white 80%);
  }

  .account-operator__action[disabled] {
    cursor: wait;
    opacity: 0.65;
  }

  .account-operator__notice {
    padding: var(--space-3);
    border-radius: var(--control-radius-lg);
    font: 500 var(--fs-12) / 1.5 var(--font-ui);
  }

  .account-operator__notice[data-tone='error'] {
    background: color-mix(in oklab, var(--color-system-red-4), white 72%);
    color: color-mix(in oklab, var(--color-system-red-contrast), black 12%);
    border: 1px solid color-mix(in oklab, var(--color-system-red), white 62%);
  }

  .account-operator__notice[data-tone='info'] {
    background: color-mix(in oklab, var(--color-system-blue), white 88%);
    color: color-mix(in oklab, var(--color-system-blue-contrast, var(--color-text)), black 18%);
    border: 1px solid color-mix(in oklab, var(--color-system-blue), white 70%);
  }

  .account-operator__table-wrap {
    overflow: auto;
    border-radius: var(--control-radius-lg);
    border: 1px solid color-mix(in oklab, var(--role-border), transparent 12%);
    background: var(--color-system-white);
  }

  .account-operator__table {
    width: 100%;
    border-collapse: collapse;
    min-width: 720px;
  }

  .account-operator__table th,
  .account-operator__table td {
    padding: 12px 14px;
    text-align: left;
    border-bottom: 1px solid color-mix(in oklab, var(--role-border), transparent 18%);
    vertical-align: top;
  }

  .account-operator__table th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: color-mix(in oklab, var(--role-surface-bg, var(--color-system-white)), white 20%);
    font: 600 var(--fs-11) / var(--lh-tight) var(--font-ui);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: color-mix(in oklab, var(--color-text), transparent 32%);
  }

  .account-operator__table tbody tr:hover {
    background: color-mix(in oklab, var(--color-system-blue), white 95%);
  }

  .account-operator__meta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 999px;
    background: color-mix(in oklab, var(--color-system-gray-4), white 54%);
    color: color-mix(in oklab, var(--color-text), transparent 18%);
    font: 600 var(--fs-10) / 1 var(--font-ui);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .account-operator__meta[data-tone='platform'] {
    background: color-mix(in oklab, var(--color-system-indigo-4), white 40%);
  }

  .account-operator__meta[data-tone='active'] {
    background: color-mix(in oklab, var(--color-system-green-4), white 24%);
  }

  .account-operator__inline-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .account-operator__empty {
    padding: var(--space-5);
    text-align: center;
    color: color-mix(in oklab, var(--color-text), transparent 35%);
  }

  .account-operator__detail-grid {
    display: grid;
    gap: var(--space-3);
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  }

  @media (max-width: 1100px) {
    .account-operator__grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="account-operator">
  <h1 class="heading-2">Account Operator</h1>
  <section class="devstudio-page-section account-operator__section">
    <p class="body-m">Berlin-backed operator surface for accessible accounts. This tool uses the same account and membership truth as Roma; it does not invent a DevStudio-only account model.</p>
  </section>
  <section class="devstudio-page-section" id="account-operator-root" aria-live="polite"></section>
</div>

<script type="module">
  const root = document.getElementById('account-operator-root');

  const state = {
    loadingAccounts: false,
    loadingSelection: false,
    saving: false,
    error: null,
    info: null,
    createName: '',
    session: { user: null, profile: null },
    accounts: [],
    defaults: { accountId: null },
    selectedAccountId: null,
    detail: null,
    members: [],
  };

  const escapeHtml = (value) => String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

  function resolveErrorMessage(error, fallback) {
    const reasonKey = typeof error?.reasonKey === 'string' ? error.reasonKey.trim() : '';
    const detail = typeof error?.detail === 'string' ? error.detail.trim() : '';

    switch (reasonKey) {
      case 'coreui.errors.auth.required':
        if (detail === 'devstudio_berlin_session_required') {
          return 'Sign in through Roma or Bob first. DevStudio account operator flows require a real Berlin session.';
        }
        return 'Your product session is missing or expired. Sign in again and retry.';
      case 'coreui.errors.auth.forbidden':
        if (detail === 'platform_account_membership_required') {
          return 'This DevStudio operator surface is restricted to humans who are members of the platform-owned account.';
        }
        return 'You do not have permission to perform that operator action.';
      case 'coreui.errors.auth.contextUnavailable':
        return 'Berlin account context is unavailable right now. Retry once the account boundary is reachable again.';
      case 'coreui.errors.payload.invalid':
        return 'The request payload is invalid. Check the input and retry.';
      case 'coreui.errors.db.readFailed':
      case 'coreui.errors.db.writeFailed':
        return 'Account truth could not be read or written. Retry, then inspect Berlin if it persists.';
      default:
        return detail || fallback;
    }
  }

  async function fetchJson(pathname, init = {}, fallbackMessage = 'Request failed.') {
    const response = await fetch(pathname, {
      method: init.method || 'GET',
      headers: {
        Accept: 'application/json',
        ...(init.body ? { 'Content-Type': 'application/json' } : {}),
        ...(init.headers || {}),
      },
      body: init.body,
      cache: 'no-store',
    });
    const payload = await response.json().catch(() => null);
    if (!response.ok) {
      const error = payload?.error || null;
      throw new Error(resolveErrorMessage(error, fallbackMessage));
    }
    return payload;
  }

  function getSelectedAccount() {
    const selectedId = String(state.selectedAccountId || '').trim();
    if (!selectedId) return null;
    return state.accounts.find((entry) => String(entry?.accountId || '').trim() === selectedId) || null;
  }

  async function loadSelection(accountId) {
    const normalizedId = String(accountId || '').trim();
    if (!normalizedId) {
      state.detail = null;
      state.members = [];
      state.selectedAccountId = null;
      render();
      return;
    }

    state.loadingSelection = true;
    state.error = null;
    state.selectedAccountId = normalizedId;
    render();

    try {
      const [detail, members] = await Promise.all([
        fetchJson(`/api/devstudio/accounts/${encodeURIComponent(normalizedId)}`, {}, 'Could not load account detail.'),
        fetchJson(`/api/devstudio/accounts/${encodeURIComponent(normalizedId)}/members`, {}, 'Could not load account members.'),
      ]);
      state.detail = detail?.account || null;
      state.members = Array.isArray(members?.members) ? members.members : [];
    } catch (error) {
      state.detail = null;
      state.members = [];
      state.error = error instanceof Error ? error.message : String(error);
    } finally {
      state.loadingSelection = false;
      render();
    }
  }

  async function loadAccounts({ preserveSelection = true } = {}) {
    state.loadingAccounts = true;
    state.error = null;
    state.info = null;
    render();

    try {
      const payload = await fetchJson('/api/devstudio/accounts', {}, 'Could not load accessible accounts.');
      state.session.user = payload?.user || null;
      state.session.profile = payload?.profile || null;
      state.accounts = Array.isArray(payload?.accounts) ? payload.accounts : [];
      state.defaults = payload?.defaults || { accountId: null };

      const preferredAccountId = preserveSelection
        ? String(state.selectedAccountId || '').trim()
        : '';
      const defaultAccountId = String(state.defaults?.accountId || '').trim();
      const nextAccountId = preferredAccountId && state.accounts.some((entry) => String(entry?.accountId || '').trim() === preferredAccountId)
        ? preferredAccountId
        : defaultAccountId || String(state.accounts[0]?.accountId || '').trim();

      await loadSelection(nextAccountId);
      return;
    } catch (error) {
      state.accounts = [];
      state.defaults = { accountId: null };
      state.selectedAccountId = null;
      state.detail = null;
      state.members = [];
      state.error = error instanceof Error ? error.message : String(error);
    } finally {
      state.loadingAccounts = false;
      render();
    }
  }

  async function handleCreateAccount() {
    const name = String(state.createName || '').trim();
    if (!name) {
      state.error = 'Account name cannot be empty.';
      render();
      return;
    }

    state.saving = true;
    state.error = null;
    state.info = null;
    render();

    try {
      const payload = await fetchJson(
        '/api/devstudio/accounts',
        {
          method: 'POST',
          body: JSON.stringify({ name }),
        },
        'Could not create the account.',
      );
      state.createName = '';
      const createdId = String(payload?.account?.accountId || payload?.defaults?.accountId || '').trim();
      state.info = createdId ? 'Account created through Berlin truth.' : 'Account created.';
      await loadAccounts({ preserveSelection: false });
      if (createdId) {
        await loadSelection(createdId);
      }
    } catch (error) {
      state.error = error instanceof Error ? error.message : String(error);
    } finally {
      state.saving = false;
      render();
    }
  }

  async function handleSwitchAccount(accountId) {
    const normalizedId = String(accountId || '').trim();
    if (!normalizedId) return;
    state.saving = true;
    state.error = null;
    state.info = null;
    render();

    try {
      await fetchJson(
        `/api/devstudio/accounts/${encodeURIComponent(normalizedId)}/switch`,
        { method: 'POST' },
        'Could not switch the active account.',
      );
      state.info = 'Active account switched through Berlin.';
      await loadAccounts({ preserveSelection: true });
    } catch (error) {
      state.error = error instanceof Error ? error.message : String(error);
    } finally {
      state.saving = false;
      render();
    }
  }

  function renderSummaryCards() {
    const accountCount = state.accounts.length;
    const activeAccount = state.accounts.find((entry) => String(entry?.accountId || '').trim() === String(state.defaults?.accountId || '').trim()) || null;
    const primaryEmail = state.session.profile?.primaryEmail || state.session.user?.email || 'Unavailable';
    const fullName = [state.session.profile?.givenName, state.session.profile?.familyName].filter(Boolean).join(' ').trim() || 'Signed-in human';

    return `
      <div class="account-operator__summary">
        <article class="account-operator__summary-card">
          <span class="account-operator__label">Operator</span>
          <span class="account-operator__value">${escapeHtml(fullName)}</span>
          <span class="account-operator__subvalue">${escapeHtml(primaryEmail)}</span>
        </article>
        <article class="account-operator__summary-card">
          <span class="account-operator__label">Accessible Accounts</span>
          <span class="account-operator__value">${escapeHtml(accountCount)}</span>
          <span class="account-operator__subvalue">Berlin-backed membership scope</span>
        </article>
        <article class="account-operator__summary-card">
          <span class="account-operator__label">Active Account</span>
          <span class="account-operator__value">${escapeHtml(activeAccount?.name || 'None')}</span>
          <span class="account-operator__subvalue">${escapeHtml(activeAccount?.accountId || 'No active context')}</span>
        </article>
      </div>
    `;
  }

  function renderAccountsTable() {
    if (!state.accounts.length) {
      return '<div class="account-operator__empty body-m">No accessible accounts are available for this Berlin session yet.</div>';
    }

    const activeAccountId = String(state.defaults?.accountId || '').trim();
    return `
      <div class="account-operator__table-wrap">
        <table class="account-operator__table body-s">
          <thead>
            <tr>
              <th>Account</th>
              <th>Role</th>
              <th>Tier</th>
              <th>State</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${state.accounts.map((entry) => {
              const accountId = String(entry?.accountId || '').trim();
              const isActive = accountId === activeAccountId;
              const selected = accountId === String(state.selectedAccountId || '').trim();
              return `
                <tr>
                  <td>
                    <div class="account-operator__value" style="font-size: var(--fs-14);">${escapeHtml(entry?.name || 'Unnamed account')}</div>
                    <div class="account-operator__subvalue">${escapeHtml(entry?.slug || accountId || 'No slug')}</div>
                    <div class="account-operator__subvalue">${escapeHtml(accountId)}</div>
                  </td>
                  <td>${escapeHtml(entry?.role || 'unknown')}</td>
                  <td>${escapeHtml(entry?.tier || 'unknown')}</td>
                  <td>
                    <div class="account-operator__inline-actions">
                      ${entry?.isPlatform ? '<span class="account-operator__meta" data-tone="platform">Platform</span>' : ''}
                      ${isActive ? '<span class="account-operator__meta" data-tone="active">Active</span>' : ''}
                      ${selected ? '<span class="account-operator__meta">Selected</span>' : ''}
                    </div>
                  </td>
                  <td>
                    <div class="account-operator__inline-actions">
                      <button class="account-operator__action" data-tone="neutral" data-action="inspect" data-account-id="${escapeHtml(accountId)}">Inspect</button>
                      <button class="account-operator__action" data-tone="blue" data-action="switch" data-account-id="${escapeHtml(accountId)}" ${isActive ? 'disabled' : ''}>${isActive ? 'Active' : 'Make Active'}</button>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderDetail() {
    const detail = state.detail || getSelectedAccount();
    if (!detail) {
      return '<div class="account-operator__empty body-m">Select an account to inspect its canonical Berlin detail and current team.</div>';
    }

    return `
      <div class="account-operator__detail-grid">
        <article class="account-operator__summary-card">
          <span class="account-operator__label">Name</span>
          <span class="account-operator__value">${escapeHtml(detail?.name || 'Unnamed')}</span>
          <span class="account-operator__subvalue">${escapeHtml(detail?.slug || 'No slug')}</span>
        </article>
        <article class="account-operator__summary-card">
          <span class="account-operator__label">Role</span>
          <span class="account-operator__value">${escapeHtml(detail?.role || 'unknown')}</span>
          <span class="account-operator__subvalue">${escapeHtml(detail?.status || 'active')}</span>
        </article>
        <article class="account-operator__summary-card">
          <span class="account-operator__label">Tier</span>
          <span class="account-operator__value">${escapeHtml(detail?.tier || 'unknown')}</span>
          <span class="account-operator__subvalue">${detail?.isPlatform ? 'Platform-owned account' : 'Standard account'}</span>
        </article>
        <article class="account-operator__summary-card">
          <span class="account-operator__label">Website</span>
          <span class="account-operator__value">${escapeHtml(detail?.websiteUrl || 'Not set')}</span>
          <span class="account-operator__subvalue">${escapeHtml(detail?.accountId || state.selectedAccountId || '')}</span>
        </article>
      </div>
    `;
  }

  function renderMembers() {
    if (!state.selectedAccountId) {
      return '<div class="account-operator__empty body-m">No account selected.</div>';
    }
    if (state.loadingSelection) {
      return '<div class="account-operator__empty body-m">Loading account detail and members…</div>';
    }
    if (!state.members.length) {
      return '<div class="account-operator__empty body-m">No members found for the selected account.</div>';
    }

    return `
      <div class="account-operator__table-wrap">
        <table class="account-operator__table body-s">
          <thead>
            <tr>
              <th>Member</th>
              <th>Role</th>
              <th>Language</th>
              <th>Location</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody>
            ${state.members.map((member) => {
              const profile = member?.profile || null;
              const fullName = [profile?.givenName, profile?.familyName].filter(Boolean).join(' ').trim() || profile?.primaryEmail || member?.userId || 'Unknown member';
              const location = [profile?.country, profile?.timezone].filter(Boolean).join(' · ') || 'Unset';
              return `
                <tr>
                  <td>
                    <div class="account-operator__value" style="font-size: var(--fs-13);">${escapeHtml(fullName)}</div>
                    <div class="account-operator__subvalue">${escapeHtml(profile?.primaryEmail || member?.userId || 'No email')}</div>
                  </td>
                  <td>${escapeHtml(member?.role || 'unknown')}</td>
                  <td>${escapeHtml(profile?.primaryLanguage || 'Unset')}</td>
                  <td>${escapeHtml(location)}</td>
                  <td>${escapeHtml(member?.createdAt || 'Unknown')}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function render() {
    root.innerHTML = `
      <div class="account-operator">
        ${state.error ? `<div class="account-operator__notice" data-tone="error">${escapeHtml(state.error)}</div>` : ''}
        ${state.info ? `<div class="account-operator__notice" data-tone="info">${escapeHtml(state.info)}</div>` : ''}

        <section class="account-operator__section">
          <div>
            <h2 class="heading-3">Operator Session</h2>
            <p class="body-s">DevStudio account flows require a real Berlin session and platform-account membership. There is no trusted-local operator data path.</p>
          </div>
          ${renderSummaryCards()}
        </section>

        <div class="account-operator__grid">
          <section class="account-operator__section">
            <div>
              <h2 class="heading-3">Accessible Accounts</h2>
              <p class="body-s">These are the accounts exposed by the current Berlin session. DevStudio is not reading account truth directly from Michael.</p>
            </div>
            <div class="account-operator__toolbar">
              <input class="account-operator__input" id="account-create-name" type="text" maxlength="80" placeholder="Create a new account" value="${escapeHtml(state.createName)}" ${state.saving ? 'disabled' : ''} />
              <button class="account-operator__action" id="account-create-submit" ${state.saving ? 'disabled' : ''}>${state.saving ? 'Working…' : 'Create Account'}</button>
              <button class="account-operator__action" data-tone="neutral" id="account-reload" ${state.loadingAccounts ? 'disabled' : ''}>${state.loadingAccounts ? 'Reloading…' : 'Reload'}</button>
            </div>
            ${renderAccountsTable()}
          </section>

          <section class="account-operator__section">
            <div>
              <h2 class="heading-3">Selected Account</h2>
              <p class="body-s">Canonical Berlin detail plus the current team for the selected account.</p>
            </div>
            ${renderDetail()}
            <div>
              <h3 class="heading-4" style="margin: 0 0 var(--space-2) 0;">Team</h3>
              ${renderMembers()}
            </div>
          </section>
        </div>
      </div>
    `;

    const createInput = root.querySelector('#account-create-name');
    if (createInput) {
      createInput.addEventListener('input', (event) => {
        state.createName = event.currentTarget.value;
      });
      createInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          void handleCreateAccount();
        }
      });
    }

    root.querySelector('#account-create-submit')?.addEventListener('click', () => {
      void handleCreateAccount();
    });

    root.querySelector('#account-reload')?.addEventListener('click', () => {
      void loadAccounts({ preserveSelection: true });
    });

    root.querySelectorAll('[data-action="inspect"]').forEach((button) => {
      button.addEventListener('click', () => {
        void loadSelection(button.getAttribute('data-account-id'));
      });
    });

    root.querySelectorAll('[data-action="switch"]').forEach((button) => {
      button.addEventListener('click', () => {
        void handleSwitchAccount(button.getAttribute('data-account-id'));
      });
    });
  }

  render();
  void loadAccounts({ preserveSelection: false });
</script>
